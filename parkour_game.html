<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦞 大龙虾跑酷 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0015;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
#gc{position:relative;border:2px solid #ff00aa;border-radius:12px;box-shadow:0 0 50px rgba(255,0,150,.25),0 0 100px rgba(0,200,255,.1);}
canvas{display:block;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<div id="gc"><canvas id="g"></canvas></div>
<script>
// ==================== 配置 ====================
const W=1024,H=550;
const GROUND=430;
const LANES=[196,372,548];

const DIFFICULTY={
  warmup:{endDist:400, speed:[4,6], types:['barrier'], spMin:38, spMax:58},
  normal:{endDist:1200,speed:[6,10], types:['barrier','beam','laser','gap','vehicle'], spMin:22, spMax:42},
  hard:{endDist:2200,speed:[10,14],types:['barrier','beam','laser','gap','vehicle'], spMin:14, spMax:28},
  extreme:{endDist:99999,speed:[14,18],types:['barrier','beam','laser','gap','vehicle','boss'], spMin:8, spMax:18}
};

// ==================== 音效引擎 ====================
let audioCtx,audioVol=0.3;
function initAudio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}}
function sfx(freq,type,dur,mul=1,slide=0){
  if(!audioCtx)return;const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  if(slide)o.frequency.linearRampToValueAtTime(freq+slide,t+dur);
  g.gain.setValueAtTime(audioVol*mul,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur);
}
function sJump(){sfx(400,'square',0.12,0.5,600)}
function sSlide(){sfx(80,'sawtooth',0.15,0.3)}
function sLane(){sfx(600,'sine',0.08,0.4)}
function sCoin(){sfx(880,'square',0.08,0.6);setTimeout(()=>sfx(1100,'square',0.08,0.6),50)}
function sPower(){sfx(200,'sine',0.3,0.5,400)}
function sHit(){sfx(50,'sawtooth',0.4,0.8)}
function sDie(){sfx(40,'sawtooth',0.6,0.8)}
function sCombo(n){sfx(600+n*100,'square',0.1,0.5)}
function sRecord(){sfx(300,'square',0.1,0.7,400);setTimeout(()=>sfx(500,'square',0.1,0.7,400),100)}

// ==================== Canvas ====================
const cv=document.getElementById('g');
cv.width=W;cv.height=H;
const C= cv.getContext('2d');

// ==================== 游戏状态 ====================
let state='menu';
let score=0,distance=0,hiScore=parseInt(localStorage.lobsterHi)||0;
let frame=0,speed=5,baseSpeed=5;
let shakeT=0,shakeI=0,flashA=0;
let combo=0,comboT=0,totalCoins=0;
let invT=0;
let release=false,releaseT=0;
let obsST=20,coinST=10;

// ==================== 玩家 ====================
const P={
  lane:1,targetX:LANES[1],x:LANES[1],y:0,w:40,h:64,
  vy:0,grounded:true,
  sliding:false,slideT:0,
  jumping:false,jumpH:0,
  dj:true,djCd:0,
  trail:[],
  shield:false,shieldT:0,
  magnet:false,magnetT:0,
  boost:false,boostT:0,
  reset(){
    this.lane=1;this.targetX=LANES[1];this.x=LANES[1];
    this.y=GROUND-this.h;this.vy=0;this.grounded=true;
    this.sliding=false;this.slideT=0;this.jumping=false;this.jumpH=0;
    this.dj=true;this.djCd=0;this.trail=[];
    this.shield=false;this.shieldT=0;this.magnet=false;this.magnetT=0;this.boost=false;this.boostT=0;
  }
};
const GRAV=0.9,JV=-15;

// ==================== 对象池 ====================
let obs=[],coins=[],pups=[],parts=[];

function spawnObs(){
  const d=getDiff();
  const type=d.types[Math.floor(Math.random()*d.types.length)];
  const lane=Math.floor(Math.random()*3);
  let w,h,clr;
  switch(type){
    case 'barrier':w=36;h=55;clr='#ff3366';break;
    case 'beam':w=44;h=30;clr='#ff8800';break;
    case 'laser':w=22;h=70;clr='#ff00cc';break;
    case 'gap':w=50;h=12;clr='#ff0000';break;
    case 'vehicle':w=60;h=38;clr='#ffaa00';break;
    case 'boss':w=70;h=80;clr='#ff0044';break;
    default:w=36;h=55;clr='#ff3366';
  }
  const lanes_used=type==='boss'?[lane,(lane+1)%3]:[lane];
  obs.push({x:W,y:GROUND-h,w,h,clr,type,lanes:lanes_used,passed:false});
}

function spawnCoinArc(lane,sx){
  const lx=LANES[lane];
  for(let i=0;i<5;i++)coins.push({x:sx+i*30,y:GROUND-80-Math.sin(i*0.6)*40,w:16,h:16,rot:0});
}

function spawnPup(type){
  const clrs={shield:'#00ccff',magnet:'#ffcc00',boost:'#00ff88',bigcoin:'#ffdd00'};
  pups.push({x:W,y:GROUND-80,w:24,h:24,type,clr:clrs[type],rot:0});
}

function emit(x,y,clr,n,spd){
  for(let i=0;i<n;i++)parts.push({x,y,clr,vx:(Math.random()-0.5)*spd,vy:(Math.random()-0.5)*spd-Math.random()*4,life:1,decay:0.02+Math.random()*0.05,size:1.5+Math.random()*4});
}

// ==================== 难度 ====================
function getDiff(){
  if(distance<400)return DIFFICULTY.warmup;
  if(distance<1200)return DIFFICULTY.normal;
  if(distance<2200)return DIFFICULTY.hard;
  return DIFFICULTY.extreme;
}

function updateDiff(){
  const d=getDiff();
  const range=d.speed;
  const ts=range[0]+Math.random()*(range[1]-range[0]);
  if(release)baseSpeed+=(range[0]-baseSpeed)*0.02;
  else baseSpeed+=(ts-baseSpeed)*0.005;
  speed=baseSpeed+(P.boost?4:0);
  if(!release&&Math.floor(distance)%300<5&&distance>50){release=true;releaseT=120;}
  if(release){releaseT--;if(releaseT<=0)release=false;}
}

// ==================== 更新 ====================
function update(){
  if(state!=='playing')return;
  frame++;

  if(invT>0)invT--;
  if(P.shield){P.shieldT--;if(P.shieldT<=0)P.shield=false;}
  if(P.magnet){P.magnetT--;if(P.magnetT<=0)P.magnet=false;}
  if(P.boost){P.boostT--;if(P.boostT<=0)P.boost=false;}
  if(P.djCd>0)P.djCd--;
  if(comboT>0){comboT--;if(comboT<=0)combo=0;}

  updateDiff();
  distance+=speed*0.3;
  score+=speed*0.1*(1+combo*0.2);
  if(shakeT>0)shakeT--;
  if(flashA>0)flashA-=0.05;

  // 跳跃持续
  if(P.jumping&&P.jumpH>0){P.jumpH--;if(P.vy<0)P.vy-=0.5;}
  P.vy+=GRAV;P.y+=P.vy;
  if(P.y>=GROUND-P.h){P.y=GROUND-P.h;P.vy=0;P.grounded=true;P.jumping=false;P.dj=true;}

  // 滑铲
  if(P.sliding){P.slideT--;P.h=30;if(P.slideT<=0){P.sliding=false;P.h=64;}}
  if(!P.sliding)P.h=64;
  if(P.sliding)P.y=GROUND-P.h;

  // 轨道移动
  P.targetX=LANES[P.lane];P.x+=(P.targetX-P.x)*0.25;

  // 尾迹
  if(frame%3===0&&P.grounded&&!P.sliding)P.trail.push({x:P.x+P.w/2,y:P.y+P.h,life:0.6,size:3+Math.random()*3});
  P.trail.forEach(t=>t.life-=0.05);
  P.trail=P.trail.filter(t=>t.life>0);

  // 障碍物生成
  const d=getDiff();
  obsST--;
  if(obsST<=0){spawnObs();obsST=d.spMin+Math.floor(Math.random()*(d.spMax-d.spMin));if(release)obsST+=30;}

  obs.forEach(o=>o.x-=speed);
  obs=obs.filter(o=>o.x>-100);

  // 金币
  coinST--;
  if(coinST<=0){spawnCoinArc(Math.floor(Math.random()*3),W);coinST=25+Math.floor(Math.random()*35);}

  coins.forEach(c=>{c.x-=speed;c.rot+=0.08;});
  if(P.magnet){coins.forEach(c=>{const dx=P.x+P.w/2-c.x,dy=P.y+P.h/2-c.y,d=Math.sqrt(dx*dx+dy*dy);if(d<180){c.x+=dx/d*6;c.y+=dy/d*6;}})}
  coins=coins.filter(c=>c.x>-30);

  // 道具
  if(release&&releaseT<10&&Math.random()<0.02&&pups.length<2)spawnPup(['shield','magnet','boost','bigcoin'][Math.floor(Math.random()*4)]);
  pups.forEach(p=>{p.x-=speed;p.rot+=0.04;});
  pups=pups.filter(p=>p.x>-30);

  // 碰撞（宽容判定：缩小40%）
  const px=P.x+12,py=P.y+10,pw=P.w-24,ph=P.h-20;
  for(let o of obs){
    if(px<o.x+o.w-6&&px+pw>o.x+6&&py<o.y+o.h&&py+ph>o.y+4){
      if(invT>0)continue;
      if(P.shield){P.shield=false;P.shieldT=0;emit(o.x+o.w/2,o.y+o.h/2,'#00ccff',20,5);sHit();continue;}
      die();return;
    }
  }

  // 金币收集
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];
    if(Math.abs(P.x+P.w/2-c.x)<30&&Math.abs(P.y+P.h/2-c.y)<35){
      coins.splice(i,1);combo++;comboT=90;
      score+=10*Math.min(combo,8);totalCoins++;sCoin();
      if(combo>0&&combo%10===0)sCombo(Math.min(combo/10,8));
      emit(c.x,c.y,'#ffdd00',8,3);
    }
  }

  // 道具收集
  for(let i=pups.length-1;i>=0;i--){
    const p=pups[i];
    if(Math.abs(P.x+P.w/2-p.x)<30&&Math.abs(P.y+P.h/2-p.y)<30){
      const t=p.type;pups.splice(i,1);sPower();emit(p.x,p.y,p.clr,15,4);
      if(t==='shield'){P.shield=true;P.shieldT=300;}
      if(t==='magnet'){P.magnet=true;P.magnetT=300;}
      if(t==='boost'){P.boost=true;P.boostT=180;}
      if(t==='bigcoin'){score+=100;totalCoins+=5;}
    }
  }

  // 计分
  obs.forEach(o=>{if(!o.passed&&o.x+o.w<P.x){o.passed=true;score+=5;}});

  // 粒子
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.decay;});
  parts=parts.filter(p=>p.life>0);
  if(frame%4===0&&P.grounded&&!P.sliding)emit(P.x+P.w/2,P.y+P.h-2,'#ffffff',1,2);
}

function die(){
  state='dead';sDie();shakeT=20;shakeI=8;flashA=0.6;
  emit(P.x+P.w/2,P.y+P.h/2,'#ff0044',60,10);
  if(score>hiScore){hiScore=Math.floor(score);localStorage.lobsterHi=hiScore;sRecord();}
}

function restart(){
  score=0;distance=0;speed=5;baseSpeed=5;frame=0;
  combo=0;comboT=0;totalCoins=0;invT=90;
  release=false;releaseT=0;
  obs=[];coins=[];pups=[];parts=[];obsST=20;coinST=10;
  P.reset();P.lane=1;P.x=LANES[1];P.targetX=LANES[1];P.y=GROUND-P.h;
  state='playing';
}

// ==================== 渲染 ====================
function drawBg(){
  const g=C.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#05001a');g.addColorStop(0.4,'#0a0030');g.addColorStop(0.7,'#150040');g.addColorStop(1,'#0a0025');
  C.fillStyle=g;C.fillRect(0,0,W,H);

  // 星空 ×0.1
  for(let i=0;i<80;i++){
    const sx=((i*137-frame*speed*0.03)%W+W)%W,sy=(i*73)%(H*0.5);
    C.fillStyle=`rgba(255,255,255,${0.2+Math.sin(frame*0.03+i)*0.3})`;
    C.fillRect(sx,sy,1.5,1.5);
  }

  // 远景高楼 ×0.3
  C.fillStyle='#0d0830';
  for(let i=0;i<10;i++){
    const bx=((i*110-frame*speed*0.08)%(W+200)+W)%(W+200)-100,bh=80+(i*47)%100;
    C.fillRect(bx,GROUND-bh,55,bh+30);
    for(let wy=GROUND-bh+12;wy<GROUND;wy+=18)
      for(let wx=bx+8;wx<bx+48;wx+=14)
        {C.fillStyle=`rgba(255,200,100,${0.1+Math.sin(wx*frame*0.02)*0.1})`;C.fillRect(wx,wy,8,10);}
    C.fillStyle='#0d0830';
  }

  // 中景建筑 ×0.5
  C.fillStyle='#150845';
  for(let i=0;i<7;i++){
    const mx=((i*170-frame*speed*0.14)%(W+300)+W)%(W+300)-150,mh=120+(i*63)%130;
    C.fillRect(mx,GROUND-mh,70,mh+30);
    C.fillStyle='#220a60';
    for(let wy=GROUND-mh+15;wy<GROUND-15;wy+=22)
      for(let wx=mx+10;wx<mx+62;wx+=18)
        {C.globalAlpha=0.2+Math.sin(wx+frame*0.05)*0.15;C.fillRect(wx,wy,10,14);}
    C.globalAlpha=1;C.fillStyle='#150845';
  }

  // 近景霓虹招牌 ×0.7
  for(let i=0;i<5;i++){
    const nx=((i*240-frame*speed*0.2)%(W+400)+W)%(W+400)-200,ny=GROUND-200-(i*40)%80;
    C.fillStyle=`rgba(${i%2?255:0},${i%3?50:200},${i%2?200:255},0.3)`;
    C.fillRect(nx,ny,80,25);
    C.fillStyle='#fff';C.font='10px "Courier New"';
    C.fillText(['NEON CITY','CYBER PARK','LOBSTER','RUN!','∞'][i],nx+4,ny+17);
  }

  // 地面
  const gg=C.createLinearGradient(0,GROUND,0,H);
  gg.addColorStop(0,'#ff00aa');gg.addColorStop(0.02,'#cc00ff');gg.addColorStop(0.08,'#1a0060');gg.addColorStop(1,'#050020');
  C.fillStyle=gg;C.fillRect(0,GROUND,W,H-GROUND);
  // 网格线
  C.strokeStyle='#ff00aa33';C.lineWidth=1;
  for(let i=0;i<30;i++){const lx=((i*36-frame*speed)%(36*30)+(36*30))%(36*30);C.beginPath();C.moveTo(lx,GROUND+2);C.lineTo(lx+20,GROUND+2);C.stroke();}
  // 主光线
  C.strokeStyle='#ff00aa';C.lineWidth=2;C.shadowColor='#ff00aa';C.shadowBlur=10;
  C.beginPath();C.moveTo(0,GROUND);C.lineTo(W,GROUND);C.stroke();C.shadowBlur=0;
}

function drawPlayer(){
  const {x,y,w,h,sliding,shield,boost,magnet}=P,px=x,py=y;

  // 尾迹
  P.trail.forEach(t=>{C.fillStyle=`rgba(255,0,150,${t.life*0.5})`;C.beginPath();C.arc(t.x,t.y,t.size,0,Math.PI*2);C.fill()});

  // 护盾
  if(shield){C.strokeStyle=`rgba(0,200,255,${0.5+Math.sin(frame*0.2)*0.3})`;C.lineWidth=3;C.shadowColor='#00ccff';C.shadowBlur=20;C.beginPath();C.arc(px+w/2,py+h/2,40,0,Math.PI*2);C.stroke();C.shadowBlur=0;}

  C.shadowColor='#ff00aa';C.shadowBlur=12;
  const bg=C.createLinearGradient(px,py,px,py+h);
  if(boost){bg.addColorStop(0,'#ffff00');bg.addColorStop(1,'#ff8800')}
  else if(magnet){bg.addColorStop(0,'#ffcc00');bg.addColorStop(1,'#ff6600')}
  else{bg.addColorStop(0,'#ff0066');bg.addColorStop(1,'#990033')}
  C.fillStyle=bg;
  if(sliding){C.beginPath();C.ellipse(px+w/2,py+h/2,w/2,h/2,0,0,Math.PI*2);C.fill()}
  else{C.beginPath();C.roundRect(px,py,w,h,10);C.fill()}
  C.shadowBlur=0;

  // 钳子
  if(!sliding){
    C.fillStyle='#ff2244';const cy=py+8,co=P.grounded?Math.sin(frame*0.2)*5:8;
    C.beginPath();C.moveTo(px-4,cy);C.lineTo(px-12-co,cy-10);C.lineTo(px-8-co,cy-2);C.closePath();C.fill();
    C.beginPath();C.moveTo(px+w+4,cy);C.lineTo(px+w+12+co,cy-10);C.lineTo(px+w+8+co,cy-2);C.closePath();C.fill();
  }

  // 眼睛
  const ey=sliding?py+5:py+14;
  C.fillStyle='#fff';
  C.beginPath();C.arc(px+w-16,ey,9,0,Math.PI*2);C.fill();C.beginPath();C.arc(px+16,ey,9,0,Math.PI*2);C.fill();
  C.fillStyle='#0a0020';
  C.beginPath();C.arc(px+w-14,ey,4.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(px+18,ey,4.5,0,Math.PI*2);C.fill();
  C.fillStyle='#fff';C.beginPath();C.arc(px+w-12,ey-3,2,0,Math.PI*2);C.fill();C.beginPath();C.arc(px+20,ey-3,2,0,Math.PI*2);C.fill();

  // 腿
  if(P.grounded&&!sliding){
    C.fillStyle='#cc0044';
    C.fillRect(px+6,py+h-6,10,8+Math.abs(Math.sin(frame*0.25))*6);
    C.fillRect(px+24,py+h-6,10,8+Math.abs(Math.cos(frame*0.25))*6);
  }
}

function drawObs(){
  obs.forEach(o=>{
    C.shadowColor=o.clr;C.shadowBlur=14;
    if(o.type==='laser'){
      C.fillStyle=`rgba(255,0,200,${0.5+Math.sin(frame*0.3)*0.3})`;C.fillRect(o.x,o.y,o.w,o.h);
      C.fillStyle=o.clr;C.fillRect(o.x+4,o.y,o.w-8,o.h);
      if(frame%6===0)emit(o.x+o.w/2,o.y+Math.random()*o.h,'#ff00ff',1,1);
    }else if(o.type==='gap'){
      C.fillStyle='#ff0000';C.fillRect(o.x,GROUND-8,o.w,12);
      C.fillStyle='#000';C.fillRect(o.x+4,GROUND-4,o.w-8,8);
      C.shadowColor='#ff0000';C.shadowBlur=20;C.fillRect(o.x+o.w/2-3,GROUND-20,6,20);
    }else{
      C.fillStyle=o.clr;C.beginPath();C.roundRect(o.x,o.y,o.w,o.h,5);C.fill();
      C.fillStyle='#00000022';
      for(let sy=o.y;sy<o.y+o.h;sy+=7)if(Math.floor(sy/7)%2===0)C.fillRect(o.x,sy,o.w,3);
      if(o.type==='boss'){C.fillStyle='#fff';C.font='bold 14px "Courier New"';C.fillText('BOSS',o.x+6,o.y+22)}
    }
  });
  C.shadowBlur=0;
}

function drawCoins(){
  coins.forEach(c=>{C.save();C.translate(c.x,c.y);C.shadowColor='#ffdd00';C.shadowBlur=8;C.fillStyle='#ffdd00';C.beginPath();C.arc(0,0,8*Math.abs(Math.cos(c.rot)),0,Math.PI*2);C.fill();C.fillStyle='#fff';C.beginPath();C.arc(0,0,5*Math.abs(Math.cos(c.rot)),0,Math.PI*2);C.fill();C.shadowBlur=0;C.restore()});
}

function drawPups(){
  pups.forEach(p=>{C.save();C.translate(p.x+p.w/2,p.y+p.h/2);C.rotate(p.rot);C.shadowColor=p.clr;C.shadowBlur=14;C.fillStyle=p.clr;C.fillRect(-p.w/2,-p.h/2,p.w,p.h);C.fillStyle='#fff';C.font='14px Arial';const lb={shield:'🛡',magnet:'🧲',boost:'⚡',bigcoin:'💰'};C.fillText(lb[p.type],-8,5);C.shadowBlur=0;C.restore()});
}

function drawParts(){
  parts.forEach(p=>{C.globalAlpha=p.life;C.fillStyle=p.clr;C.shadowColor=p.clr;C.shadowBlur=3;C.beginPath();C.arc(p.x,p.y,p.size,0,Math.PI*2);C.fill();C.shadowBlur=0});
  C.globalAlpha=1;
}

function drawHUD(){
  C.shadowColor='#ff00aa';C.shadowBlur=6;C.textAlign='left';
  C.fillStyle='#fff';C.font='bold 22px "Courier New"';C.fillText(`💎 ${Math.floor(score)}`,18,34);
  C.fillText(`📏 ${Math.floor(distance)}m`,18,60);
  C.shadowBlur=0;
  C.textAlign='right';C.fillStyle='#ffffff88';C.font='13px "Courier New"';C.fillText(`🏆 最高:${Math.floor(hiScore)}`,W-18,28);

  if(combo>=5){
    const sz=20+Math.min(combo,20),pu=1+Math.sin(frame*0.2)*0.1;
    C.textAlign='center';C.fillStyle=combo>=20?'#ff4400':combo>=10?'#ffdd00':'#ff00aa';
    C.font=`bold ${sz}px "Courier New"`;C.shadowColor=combo>=20?'#ff0000':'#ffdd00';C.shadowBlur=15;
    C.save();C.translate(W/2,GROUND-60);C.scale(pu,pu);C.fillText(`x${Math.min(combo,8)} COMBO!`,0,0);C.restore();C.shadowBlur=0;
  }

  C.textAlign='left';let si=18;C.font='12px "Courier New"';
  if(P.shield){C.fillStyle='#00ccff';C.fillText(`🛡 ${Math.ceil(P.shieldT/60)}s`,18,GROUND-20);si+=80}
  if(P.magnet){C.fillStyle='#ffcc00';C.fillText(`🧲 ${Math.ceil(P.magnetT/60)}s`,18+si,GROUND-20);si+=80}
  if(P.boost){C.fillStyle='#00ff88';C.fillText(`⚡ ${Math.ceil(P.boostT/60)}s`,18+si,GROUND-20)}

  if(release){C.textAlign='center';C.fillStyle='#ffdd00';C.font='bold 16px "Courier New"';C.shadowColor='#ffdd00';C.shadowBlur=10;C.fillText('🌟 BONUS ZONE! 🌟',W/2,GROUND-30);C.shadowBlur=0}
}

function drawMenu(){
  C.textAlign='center';
  C.fillStyle='#ff00aa';C.font='bold 40px "Courier New"';C.shadowColor='#ff00aa';C.shadowBlur=25;
  C.fillText('🦞 大龙虾跑酷 2.0 🦞',W/2,H/2-90);C.shadowBlur=0;
  C.fillStyle='#fff';C.font='16px "Microsoft YaHei"';C.fillText('CYBERPUNK CITY PARKOUR',W/2,H/2-45);
  C.fillStyle='#ccc';C.font='14px "Microsoft YaHei"';
  ['🎮 ← → 换道 | ↑/空格 跳跃(长按更高) | ↓/S 滑铲 | 双击空格二段跳','   收集金币触发Combo倍率 | 道具：🛡护盾 🧲磁铁 ⚡加速 💰大金币','📱 手机：左半屏←→ | 上半屏跳跃 | 下半屏滑铲','','点击屏幕 或 按空格 开始游戏'].forEach((l,i)=>C.fillText(l,W/2,H/2-15+i*28));
  if(hiScore>0){C.fillStyle='#ffdd00';C.font='bold 16px "Courier New"';C.fillText(`🏆 历史最高分：${Math.floor(hiScore)}`,W/2,H/2+145)}
}

function drawDeath(){
  C.fillStyle='#00000088';C.fillRect(0,0,W,H);
  C.textAlign='center';
  C.fillStyle='#ff0044';C.font='bold 42px "Courier New"';C.shadowColor='#ff0044';C.shadowBlur=25;
  C.fillText('GAME OVER',W/2,H/2-40);C.shadowBlur=0;
  C.fillStyle='#fff';C.font='20px "Microsoft YaHei"';C.fillText(`得分：${Math.floor(score)}    距离：${Math.floor(distance)}m    💎${totalCoins}`,W/2,H/2+15);
  C.fillText(`最高分：${Math.floor(hiScore)}`,W/2,H/2+45);
  if(score>=hiScore&&score>0){C.fillStyle='#ffdd00';C.font='bold 24px "Courier New"';C.shadowColor='#ffdd00';C.shadowBlur=15;C.fillText('🏆 NEW RECORD! 🏆',W/2,H/2-85);C.shadowBlur=0}
  C.fillStyle='#999';C.font='15px "Microsoft YaHei"';C.fillText('按R键 或 点击屏幕 重新开始',W/2,H/2+85);
}

function draw(){
  C.clearRect(0,0,W,H);
  let sx=0,sy=0;if(shakeT>0){sx=(Math.random()-0.5)*shakeI*(shakeT/20);sy=(Math.random()-0.5)*shakeI*(shakeT/20)}
  C.save();C.translate(sx,sy);
  drawBg();drawCoins();drawPups();drawObs();drawParts();if(state!=='menu')drawPlayer();
  if(flashA>0){C.fillStyle=`rgba(255,255,255,${flashA})`;C.fillRect(0,0,W,H)}
  C.restore();
  if(state==='menu')drawMenu();
  if(state==='dead')drawDeath();
  if(state==='playing'||state==='dead')drawHUD();
}

// ==================== 输入 ====================
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;initAudio();
  if(state==='menu'&&(e.code==='Space'||e.code==='Enter')){restart();return}
  if(state==='dead'&&e.code==='KeyR'){restart();return}
  if(state!=='playing')return;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();
    if(P.grounded){P.vy=JV;P.grounded=false;P.jumping=true;P.jumpH=18;sJump()}
    else if(P.dj&&P.djCd<=0){P.vy=JV*0.75;P.dj=false;P.djCd=30;sJump();emit(P.x+P.w/2,P.y+P.h,'#fff',10,4)}
  }
  if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();if(P.grounded&&!P.sliding){P.sliding=true;P.slideT=14;sSlide()}}
  if((e.code==='ArrowLeft'||e.code==='KeyA')&&P.lane>0){P.lane--;sLane()}
  if((e.code==='ArrowRight'||e.code==='KeyD')&&P.lane<2){P.lane++;sLane()}
});
window.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='ArrowUp'){P.jumping=false;P.jumpH=0};if(e.code==='ArrowDown'||e.code==='KeyS'){if(P.sliding){P.sliding=false;P.slideT=0}}});

cv.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  if(state==='menu'){restart();return}if(state==='dead'){restart();return}
  const t=e.touches[0],r=cv.getBoundingClientRect(),tx=t.clientX-r.left,ty=t.clientY-r.top,rx=tx/r.width,ry=ty/r.height;
  if(ry<0.45){if(P.grounded){P.vy=JV;P.grounded=false;P.jumping=true;P.jumpH=18;sJump()}else if(P.dj&&P.djCd<=0){P.vy=JV*0.75;P.dj=false;P.djCd=30;sJump();emit(P.x+P.w/2,P.y+P.h,'#fff',10,4)}}
  else if(ry>0.55){if(P.grounded&&!P.sliding){P.sliding=true;P.slideT=14;sSlide()}}
  if(rx<0.3&&P.lane>0){P.lane--;sLane()}if(rx>0.7&&P.lane<2){P.lane++;sLane()}
});
cv.addEventListener('touchend',e=>{P.jumping=false;P.jumpH=0;if(P.sliding){P.sliding=false;P.slideT=0}});
cv.addEventListener('click',()=>{initAudio();if(state==='menu'||state==='dead')restart()});

// ==================== 主循环 ====================
P.x=LANES[1];P.targetX=LANES[1];P.y=GROUND-P.h;
function loop(){update();draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
