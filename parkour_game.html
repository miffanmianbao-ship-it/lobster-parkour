<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐭 小鼠去旅行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Microsoft YaHei',sans-serif;}
#gc{position:relative;border:3px solid #8B7355;border-radius:14px;box-shadow:0 0 40px rgba(139,115,85,.3)}
canvas{display:block;border-radius:11px;cursor:pointer}
</style>
</head>
<body>
<div id="gc"><canvas id="g"></canvas></div>
<script>
const W=1024,H=550;
const GROUND=420;
const LANES=[196,372,548];

// ==================== 音效 ====================
let actx;
function ia(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function sfx(f,t,d,m=1,s=0){if(!actx)return;const n=actx.currentTime;const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.setValueAtTime(f,n);if(s)o.frequency.linearRampToValueAtTime(f+s,n+d);g.gain.setValueAtTime(0.25*m,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+d)}
function se(f,t,d){sfx(f,t,d,1,0)}
function jmp(){se(500,'sine',0.1,300)}function sld(){se(100,'triangle',0.12)}function chg(){se(700,'sine',0.06)}function coinS(){se(1000,'sine',0.06);setTimeout(()=>se(1300,'sine',0.06),40)}function pwrS(){se(300,'sine',0.2,400)}function dieS(){se(60,'sawtooth',0.5)}function recS(){se(400,'square',0.08,300);setTimeout(()=>se(600,'square',0.08,300),80)}function envS(){se(200,'sine',0.12,200);setTimeout(()=>se(400,'sine',0.12,200),100);setTimeout(()=>se(600,'sine',0.12,200),200)}

// ==================== Canvas ====================
const cv=document.getElementById('g');
cv.width=W;cv.height=H;
const C=cv.getContext('2d');

// ==================== 环境系统 ====================
const ENVS=[
  {name:'翠绿森林',start:0,sky:['#87CEEB','#C8E6C9'],ground:['#5D8A3C','#4A7030'],accent:'#FFD700'},
  {name:'金色沙漠',start:500,sky:['#FFDAB9','#FFE4C4'],ground:['#D4A856','#C49540'],accent:'#FF6347'},
  {name:'蔚蓝海洋',start:1000,sky:['#87CEEB','#B0E0E6'],ground:['#6BAED6','#5A9CC5'],accent:'#FFD700'},
  {name:'雪山高原',start:1500,sky:['#E8F0F8','#F0F4F8'],ground:['#E8EDF2','#D8DDE2'],accent:'#FF69B4'},
  {name:'樱花小镇',start:2000,sky:['#FFE4E1','#FFD1DC'],ground:['#9B7FB5','#8B6FA5'],accent:'#FF69B4'}
];

function getEnv(){for(let i=ENVS.length-1;i>=0;i--)if(distance>=ENVS[i].start)return ENVS[i];return ENVS[0]}
function getEi(){for(let i=ENVS.length-1;i>=0;i--)if(distance>=ENVS[i].start)return i;return 0}

// ==================== 状态 ====================
let state='menu';
let score=0,distance=0,hiScore=parseInt(localStorage.mouseHi)||0;
let frame=0,speed=2.5,baseSpeed=2.5;
let shakeT=0,shakeI=0,flashA=0;
let combo=0,comboT=0,stars=0;
let invT=0;
let release=false,releaseT=0;
let obsST=40,coinST=20;
let lastEi=-1;
let envTrans=0,envTransDir=0;

// ==================== 玩家 ====================
const P={
  lane:1,tX:LANES[1],x:LANES[1],y:0,w:36,h:50,
  vy:0,onGround:true,
  sliding:false,slT:0,
  jumping:false,jh:0,
  dj:true,djCd:0,
  trail:[],
  shield:false,shT:0,
  magnet:false,mgT:0,
  boost:false,bsT:0,
  reset(){
    this.lane=1;this.tX=LANES[1];this.x=LANES[1];
    this.y=GROUND-this.h;this.vy=0;this.onGround=true;
    this.sliding=false;this.slT=0;this.jumping=false;this.jh=0;
    this.dj=true;this.djCd=0;this.trail=[];
    this.shield=false;this.shT=0;this.magnet=false;this.mgT=0;this.boost=false;this.bsT=0;
  }
};
const GRAV=0.7,JV=-13;

// ==================== 对象池 ====================
let obs=[],coins=[],pups=[],parts=[];

const OBS_DEF={
  0:[ // 森林
    {type:'log',w:44,h:30,draw:function(x,y){C.fillStyle='#6B4226';C.fillRect(x+2,y+4,40,22);C.fillStyle='#8B6914';C.fillRect(x+4,y+6,36,18);C.strokeStyle='#5C3317';C.lineWidth=1;C.strokeRect(x+2,y+4,40,22);C.fillStyle='#6B4226';C.beginPath();C.arc(x+8,y+8,8,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+34,y+20,7,0,Math.PI*2);C.fill()}},
    {type:'mushroom',w:32,h:36,draw:function(x,y){C.fillStyle='#F5DEB3';C.fillRect(x+12,y+16,8,20);C.fillStyle='#FF6347';C.beginPath();C.arc(x+16,y+10,16,Math.PI,0);C.fill();C.fillStyle='#FFF';C.beginPath();C.arc(x+8,y+6,5,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+22,y+8,4,0,Math.PI*2);C.fill()}},
    {type:'thorn',w:38,h:28,draw:function(x,y){C.fillStyle='#228B22';C.beginPath();C.moveTo(x+4,y+28);C.quadraticCurveTo(x+8,y+10,x+19,y+2);C.quadraticCurveTo(x+30,y+10,x+34,y+28);C.closePath();C.fill();for(let j=0;j<5;j++){C.fillStyle='#FF1493';C.beginPath();C.arc(x+8+j*6,y+6+Math.abs(j-2)*6,3,0,Math.PI*2);C.fill()}}}
  ],
  1:[ // 沙漠
    {type:'cactus',w:28,h:56,draw:function(x,y){const cx=x+14;const by=y+56;C.fillStyle='#2E8B57';C.fillRect(cx-5,by-50,10,50);C.fillRect(cx-5,by-35,20,8);C.beginPath();C.arc(cx+5,by-35,10,0,Math.PI*2);C.fill();C.fillRect(cx-13,by-25,10,7);C.beginPath();C.arc(cx-8,by-25,8,0,Math.PI*2);C.fill();C.fillStyle='#FFF';for(let s=0;s<8;s++){C.fillRect(cx-3+s*2,by-42+s*3,1,4)}}},
    {type:'tumbleweed',w:36,h:36,draw:function(x,y){const cx=x+18,cy=y+18;C.strokeStyle='#BDB76B';C.lineWidth=2;for(let a=0;a<8;a++){const r=a*Math.PI/4;C.beginPath();C.arc(cx+Math.cos(r+frame*0.05)*5,cy+Math.sin(r+frame*0.05)*5,12,0,Math.PI*1.8);C.stroke()}C.fillStyle='#BDB76B';C.beginPath();C.arc(cx,cy,5,0,Math.PI*2);C.fill()}},
    {type:'sign',w:20,h:50,draw:function(x,y){C.strokeStyle='#8B4513';C.lineWidth=4;C.beginPath();C.moveTo(x+10,y+50);C.lineTo(x+10,y+15);C.stroke();C.fillStyle='#DEB887';C.fillRect(x,y,20,15);C.strokeStyle='#8B4513';C.lineWidth=2;C.strokeRect(x,y,20,15);C.fillStyle='#8B4513';C.font='bold 8px "Microsoft YaHei"';C.textAlign='center';C.fillText('沙漠',x+10,y+11)}}
  ],
  2:[ // 海洋
    {type:'driftwood',w:50,h:26,draw:function(x,y){C.fillStyle='#8B7355';C.beginPath();C.ellipse(x+25,y+13,25,13,0,0,Math.PI*2);C.fill();C.fillStyle='#A0845C';C.beginPath();C.ellipse(x+20,y+10,18,8,0,0,Math.PI*2);C.fill();C.strokeStyle='#6B5335';C.lineWidth=1;C.stroke()}},
    {type:'shell',w:30,h:28,draw:function(x,y){C.fillStyle='#FFB6C1';C.beginPath();C.arc(x+15,y+14,14,0,Math.PI);C.fill();C.strokeStyle='#FF69B4';C.lineWidth=1;for(let i=0;i<7;i++){C.beginPath();C.moveTo(x+15,y+14);C.lineTo(x+2+i*4,y+2);C.stroke()}C.fillStyle='#FFF0F5';C.beginPath();C.arc(x+15,y+10,6,0,Math.PI);C.fill()}},
    {type:'crab',w:34,h:22,draw:function(x,y){C.fillStyle='#FF6347';C.beginPath();C.ellipse(x+17,y+11,17,11,0,0,Math.PI*2);C.fill();C.strokeStyle='#FF4500';C.lineWidth=2;for(let s=-1;s<=1;s+=2){C.beginPath();C.moveTo(x+17+s*12,y+6);C.lineTo(x+17+s*22,y-4);C.stroke();C.beginPath();C.moveTo(x+17+s*12,y+12);C.lineTo(x+17+s*22,y+20);C.stroke()}C.fillStyle='#FFF';C.beginPath();C.arc(x+10,y+7,3,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+24,y+7,3,0,Math.PI*2);C.fill();C.fillStyle='#000';C.beginPath();C.arc(x+9,y+7,1.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+23,y+7,1.5,0,Math.PI*2);C.fill()}}
  ],
  3:[ // 雪山
    {type:'snowpile',w:44,h:28,draw:function(x,y){C.fillStyle='#F0F8FF';C.beginPath();C.ellipse(x+22,y+14,22,14,0,0,Math.PI*2);C.fill();C.fillStyle='#FFFFFF';C.beginPath();C.ellipse(x+18,y+10,15,9,0,0,Math.PI*2);C.fill();C.strokeStyle='#E0E8F0';C.lineWidth=1;C.beginPath();C.ellipse(x+22,y+14,22,14,0,0,Math.PI*2);C.stroke()}},
    {type:'iceblock',w:26,h:40,draw:function(x,y){const g=C.createLinearGradient(x,y,x,y+40);g.addColorStop(0,'#E0F0FF');g.addColorStop(0.5,'#B0E0E6');g.addColorStop(1,'#87CEEB');C.fillStyle=g;for(let r=0;r<4;r++){C.fillRect(x+2+r*6,y+4+r*9,6,8);}C.strokeStyle='#ADD8E6';C.lineWidth=2;C.strokeRect(x+2,y+4,22,36)}},
    {type:'pinecone',w:28,h:32,draw:function(x,y){C.fillStyle='#8B4513';C.beginPath();C.ellipse(x+14,y+16,14,16,0,0,Math.PI*2);C.fill();C.strokeStyle='#6B3410';C.lineWidth=1;for(let r=0;r<7;r++){C.beginPath();C.arc(x+14,y+8+r*3,10-r,0,Math.PI);C.stroke()}}}
  ],
  4:[ // 小镇
    {type:'fence',w:48,h:30,draw:function(x,y){C.fillStyle='#DEB887';C.fillRect(x,y+20,48,4);C.fillRect(x,y+10,48,4);for(let p=0;p<5;p++){C.fillRect(x+2+p*11,y+6,4,22);C.fillStyle='#F5DEB3';C.beginPath();C.moveTo(x+4+p*11,y+2);C.lineTo(x+2+p*11,y+8);C.lineTo(x+6+p*11,y+8);C.closePath();C.fill();C.fillStyle='#DEB887'}}},
    {type:'flowerpot',w:28,h:40,draw:function(x,y){C.fillStyle='#CD853F';C.beginPath();C.moveTo(x+4,y+20);C.lineTo(x,y+40);C.lineTo(x+28,y+40);C.lineTo(x+24,y+20);C.closePath();C.fill();C.fillStyle='#228B22';C.beginPath();C.arc(x+14,y+16,12,0,Math.PI);C.fill();C.fillStyle='#FF69B4';C.beginPath();C.arc(x+8,y+12,5,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+20,y+8,5,0,Math.PI*2);C.fill();C.fillStyle='#FFD700';C.beginPath();C.arc(x+14,y+6,4,0,Math.PI*2);C.fill()}},
    {type:'mailbox',w:24,h:42,draw:function(x,y){C.strokeStyle='#8B4513';C.lineWidth=3;C.beginPath();C.moveTo(x+12,y+42);C.lineTo(x+12,y+18);C.stroke();C.fillStyle='#FF6347';C.fillRect(x+2,y+4,20,14);C.strokeStyle='#8B4513';C.lineWidth=2;C.strokeRect(x+2,y+4,20,14);C.fillStyle='#FFD700';C.fillRect(x+12,y+8,4,6)}}
  ]
};

function spawnObs(){
  const ei=getEi();
  const types=OBS_DEF[ei]||OBS_DEF[0];
  const t=types[Math.floor(Math.random()*types.length)];
  const lane=Math.floor(Math.random()*3);
  obs.push({x:W,y:GROUND-t.h,w:t.w,h:t.h,draw:t.draw,type:t.type,lane,passed:false});
}

function spawnCoins(lane,sx){
  for(let i=0;i<5;i++)coins.push({x:sx+i*28,y:GROUND-75-Math.sin(i*0.6)*35,w:14,h:14,rot:0,glow:0});
}

function spawnPup(type){
  const cs={shield:'#4169E1',magnet:'#FFD700',boost:'#32CD32',star5:'#FF69B4'};
  pups.push({x:W,y:GROUND-75,w:22,h:22,type,c:cs[type],rot:0});
}

function emit(x,y,c,n,spd){
  for(let i=0;i<n;i++)parts.push({x,y,c,vx:(Math.random()-0.5)*spd,vy:(Math.random()-0.5)*spd-Math.random()*3,life:1,dec:0.015+Math.random()*0.04,size:1+Math.random()*3});
}

// ==================== 更新 ====================
function update(){
  if(state!=='playing')return;
  frame++;

  if(invT>0)invT--;
  if(P.shield){P.shT--;if(P.shT<=0)P.shield=false;}
  if(P.magnet){P.mgT--;if(P.mgT<=0)P.magnet=false;}
  if(P.boost){P.bsT--;if(P.bsT<=0)P.boost=false;}
  if(P.djCd>0)P.djCd--;
  if(comboT>0){comboT--;if(comboT<=0)combo=0;}

  // 环境切换
  const ei=getEi();
  if(ei!==lastEi){lastEi=ei;envTrans=80;envTransDir=1;envS()}
  if(envTrans>0)envTrans--;

  // 速度（慢！）
  const phase=Math.min(Math.floor(distance/500),4);
  const sr=[[2,3.5],[3,5],[3.5,6],[4,7],[5,8]][phase];
  const ts=sr[0]+(sr[1]-sr[0])*Math.min(distance/3000,1);
  if(release)baseSpeed+=(sr[0]-baseSpeed)*0.02;
  else baseSpeed+=(ts-baseSpeed)*0.003;
  speed=baseSpeed+(P.boost?2.5:0);

  distance+=speed*0.25;
  score+=1+combo*0.3;
  if(shakeT>0)shakeT--;
  if(flashA>0)flashA-=0.04;

  // 跳跃
  if(P.jumping&&P.jh>0){P.jh--;if(P.vy<0)P.vy-=0.4;}
  P.vy+=GRAV;P.y+=P.vy;
  if(P.y>=GROUND-P.h){P.y=GROUND-P.h;P.vy=0;P.onGround=true;P.jumping=false;P.dj=true;}

  // 滑铲
  if(P.sliding){P.slT--;P.h=28;if(P.slT<=0){P.sliding=false;P.h=50;}}
  if(!P.sliding)P.h=50;
  if(P.sliding)P.y=GROUND-P.h;

  P.tX=LANES[P.lane];P.x+=(P.tX-P.x)*0.22;

  if(frame%4===0&&P.onGround&&!P.sliding)P.trail.push({x:P.x+P.w/2,y:P.y+P.h,life:0.5,size:2+Math.random()*2});
  P.trail.forEach(t=>t.life-=0.04);
  P.trail=P.trail.filter(t=>t.life>0);

  // 障碍物生成（大间距）
  obsST--;
  if(obsST<=0){spawnObs();const minGap=Math.max(40,55-phase*3);obsST=minGap+Math.floor(Math.random()*25);if(release)obsST+=50;}

  obs.forEach(o=>o.x-=speed);
  obs=obs.filter(o=>o.x>-80);

  // 星星
  coinST--;
  if(coinST<=0){spawnCoins(Math.floor(Math.random()*3),W);coinST=30+Math.floor(Math.random()*35);}

  coins.forEach(c=>{c.x-=speed;c.rot+=0.06;c.glow+=0.05});
  if(P.magnet){coins.forEach(c=>{const dx=P.x+P.w/2-c.x,dy=P.y+P.h/2-c.y,d=Math.sqrt(dx*dx+dy*dy);if(d<160){c.x+=dx/d*5;c.y+=dy/d*5;}})}
  coins=coins.filter(c=>c.x>-30);

  // 道具
  if(release&&releaseT<8&&Math.random()<0.012&&pups.length<2)spawnPup(['shield','magnet','boost','star5'][Math.floor(Math.random()*4)]);
  pups.forEach(p=>{p.x-=speed;p.rot+=0.04;});
  pups=pups.filter(p=>p.x>-30);

  // 释放区（每400m）
  if(!release&&Math.floor(distance)%400<4&&distance>40){release=true;releaseT=100;}
  if(release){releaseT--;if(releaseT<=0)release=false;}

  // 碰撞
  const px=P.x+10,py=P.y+8,pw=P.w-20,ph=P.h-16;
  for(let o of obs){
    if(px<o.x+o.w-5&&px+pw>o.x+5&&py<o.y+o.h-2&&py+ph>o.y+2){
      if(invT>0)continue;
      if(P.shield){P.shield=false;P.shT=0;emit(o.x+o.w/2,o.y+o.h/2,'#4169E1',18,5);return;}
      die();return;
    }
  }

  // 收集星星
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];
    if(Math.abs(P.x+P.w/2-c.x)<28&&Math.abs(P.y+P.h/2-c.y)<32){
      coins.splice(i,1);combo++;comboT=80;
      score+=10*Math.min(combo,8);stars++;coinS();
      if(combo%8===0)emit(c.x,c.y,'#FFD700',12,4);
      else emit(c.x,c.y,'#FFD700',5,2);
    }
  }

  // 道具
  for(let i=pups.length-1;i>=0;i--){
    const p=pups[i];
    if(Math.abs(P.x+P.w/2-p.x)<28&&Math.abs(P.y+P.h/2-p.y)<28){
      const t=p.type;pups.splice(i,1);pwrS();emit(p.x,p.y,p.c,12,4);
      if(t==='shield'){P.shield=true;P.shT=350;}
      if(t==='magnet'){P.magnet=true;P.mgT=350;}
      if(t==='boost'){P.boost=true;P.bsT=200;}
      if(t==='star5'){stars+=5;score+=80;}
    }
  }

  obs.forEach(o=>{if(!o.passed&&o.x+o.w<P.x){o.passed=true;score+=3;}});

  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=p.dec;});
  parts=parts.filter(p=>p.life>0);
}

function die(){state='dead';dieS();shakeT=18;shakeI=7;flashA=0.5;emit(P.x+P.w/2,P.y+P.h/2,'#FF6347',45,8);if(score>hiScore){hiScore=Math.floor(score);localStorage.mouseHi=hiScore;recS()}}

function restart(){
  score=0;distance=0;speed=2.5;baseSpeed=2.5;frame=0;lastEi=-1;envTrans=0;
  combo=0;comboT=0;stars=0;invT=80;
  release=false;releaseT=0;
  obs=[];coins=[];pups=[];parts=[];obsST=35;coinST=15;
  P.reset();P.lane=1;P.x=LANES[1];P.tX=LANES[1];P.y=GROUND-P.h;
  state='playing';
}

// ==================== 背景绘制 ====================
function skyGrad(top,bot){
  const g=C.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,top);g.addColorStop(0.7,bot);g.addColorStop(1,getEnv().ground[0]);
  return g;
}

function cloud(x,y,s){
  C.fillStyle='rgba(255,255,255,0.7)';
  C.beginPath();C.arc(x,y,18*s,0,Math.PI*2);C.arc(x+16*s,y-7*s,14*s,0,Math.PI*2);C.arc(x+32*s,y,16*s,0,Math.PI*2);C.arc(x-10*s,y+4*s,12*s,0,Math.PI*2);C.fill();
}

function sun(cx,cy,r,c1,c2){
  C.fillStyle=c2;if(c2)C.beginPath(),C.arc(cx,cy,r+15,0,Math.PI*2),C.fill();
  C.fillStyle=c1;C.beginPath();C.arc(cx,cy,r,0,Math.PI*2);C.fill();
}

// ---- 森林背景 ----
function drawForestBg(){
  C.fillStyle=skyGrad('#87CEEB','#B8E8C0');C.fillRect(0,0,W,GROUND);
  sun(860,70,35,'#FFF9C4','rgba(255,249,196,0.2)');
  cloud(100,45,0.8);cloud(420,70,1);cloud(700,35,0.7);cloud(900,60,0.6);

  // 远山
  C.fillStyle='#7BAE5A';
  C.beginPath();C.moveTo(0,GROUND-60);C.quadraticCurveTo(180,GROUND-170,380,GROUND-90);C.quadraticCurveTo(600,GROUND-200,800,GROUND-80);C.quadraticCurveTo(920,GROUND-130,1024,GROUND-55);C.lineTo(1024,GROUND);C.lineTo(0,GROUND);C.fill();

  // 树林层
  for(let i=0;i<20;i++){
    const tx=((i*58-frame*speed*0.06)%(W+80))-40;
    const ty=GROUND-50-((i*31)%40);
    const s=0.5+((i*17)%30)/100;
    drawConiferTree(tx,ty,s,'#4A8C30');
  }
  // 近树
  for(let i=0;i<8;i++){
    const tx=((i*145-frame*speed*0.12)%(W+200))-100;
    const s2=0.7+((i*23)%30)/100;
    drawConiferTree(tx,GROUND-65-((i*41)%40),s2,'#3D7A25');
  }
  // 花朵
  for(let i=0;i<20;i++){

function drawCactus(x,y){

// ---- 雪山背景 ----
function drawSnowBg(){
  C.fillStyle=skyGrad('#E8F0F8','#F0F4F8');C.fillRect(0,0,W,GROUND);

  // 雪山
  for(let m=0;m<4;m++){
    const mx=((m*280-frame*speed*0.04)%(W+600))-300;
    const mh=80+(m%2)*60;
    C.fillStyle='#E8EDF2';
    C.beginPath();C.moveTo(mx-40,GROUND-30);C.lineTo(mx+40,m>1?GROUND-mh-30:GROUND-mh);C.lineTo(mx+120,GROUND-30);C.closePath();C.fill();
    C.fillStyle='#FFFFFF';
    C.beginPath();C.moveTo(mx+30,m>1?GROUND-mh-25:GROUND-mh+5);C.lineTo(mx+55,m>1?GROUND-mh-55:GROUND-mh-20);C.lineTo(mx+80,m>1?GROUND-mh-25:GROUND-mh+5);C.closePath();C.fill();
  }

  cloud(120,40,0.6);cloud(450,70,0.7);cloud(750,35,0.5);

  // 松树
  for(let p=0;p<10;p++){
    const px=((p*115-frame*speed*0.1)%(W+200))-100;
    const ps=0.65+((p*19)%25)/100;
    drawSnowPine(px,GROUND-30-((p*27)%25),ps);
  }

  // 雪花飘落
  for(let s=0;s<40;s++){
    const sx=((s*97+frame*1.2)%W+W)%W;
    const sy=((s*67+frame*0.5)%H);
    C.fillStyle='rgba(255,255,255,0.5)';
    C.beginPath();C.arc(sx,sy,1.5,0,Math.PI*2);C.fill();
  }
}

function drawSnowPine(x,y,s){
  C.fillStyle='#5C4033';C.fillRect(x-2*s,y,4*s,20*s);
  for(let j=0;j<4;j++){
    C.fillStyle='#2D5016';
    C.beginPath();C.moveTo(x,y-j*8*s);C.lineTo(x-12*s-j*s,y-j*8*s-14*s);C.lineTo(x+12*s+j*s,y-j*8*s-14*s);C.closePath();C.fill();
    C.fillStyle='#FFF';
    C.beginPath();C.moveTo(x,y-j*8*s);C.lineTo(x-6*s,y-j*8*s-7*s);C.lineTo(x+6*s,y-j*8*s-7*s);C.closePath();C.fill();
  }
}

  }

  // 樱花树
  for(let c=0;c<12;c++){

  }

// ==================== 主背景绘制 ====================
function drawBg(){
  const ei=getEi();
  if(ei===0)drawForestBg();
  else if(ei===1)drawDesertBg();
  else if(ei===2)drawOceanBg();
  else if(ei===3)drawSnowBg();
  else drawTownBg();

  // 地面
  const env=getEnv();
  const gg=C.createLinearGradient(0,GROUND,0,H);
  gg.addColorStop(0,env.ground[0]);gg.addColorStop(0.12,env.ground[1]);gg.addColorStop(1,'#3D2B1F');
  C.fillStyle=gg;C.fillRect(0,GROUND,W,H-GROUND);
  C.strokeStyle=env.ground[0];C.lineWidth=2;
  C.beginPath();C.moveTo(0,GROUND);C.lineTo(W,GROUND);C.stroke();

  // 环境切换遮罩
  if(envTrans>0){
    C.fillStyle=`rgba(255,255,255,${envTrans/160})`;

      C.textAlign='center';C.fillStyle=`rgba(0,0,0,${(envTrans-60)/30})`;

    }
  }
}

// ==================== 角色 ====================
function drawPlayer(){
  const {x,y,w,h,sliding,shield,boost,magnet}=P;

  // 尾迹（小灰尘）
  P.trail.forEach(t=>{C.fillStyle=`rgba(210,180,140,${t.life*0.3})`;C.beginPath();C.arc(t.x,t.y,t.size,0,Math.PI*2);C.fill()});

  // 护盾
  if(shield){C.strokeStyle=`rgba(65,105,225,${0.4+Math.sin(frame*0.2)*0.3})`;C.lineWidth=3;C.beginPath();C.arc(x+w/2,y+h/2,33,0,Math.PI*2);C.stroke()}

  if(sliding){
    // 滑铲身体
    C.fillStyle='#C4A56A';C.beginPath();C.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);C.fill();
    // 耳朵（趴下）
    C.fillStyle='#A0845C';C.beginPath();C.arc(x+8,y+2,6,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+w-8,y+2,6,0,Math.PI*2);C.fill();
    // 眼睛
    C.fillStyle='#FFF';C.beginPath();C.arc(x+12,y+6,5,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+w-12,y+6,5,0,Math.PI*2);C.fill();
    C.fillStyle='#1a1a1a';C.beginPath();C.arc(x+13,y+6,2.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+w-11,y+6,2.5,0,Math.PI*2);C.fill();
  }else{
    // 身体渐变
    const bg=C.createLinearGradient(x,y,x,y+h);
    if(boost){bg.addColorStop(0,'#FFD700');bg.addColorStop(1,'#FF8C00')}
    else if(magnet){bg.addColorStop(0,'#FFB347');bg.addColorStop(1,'#CD853F')}
    else{bg.addColorStop(0,'#DEB887');bg.addColorStop(0.7,'#C4A56A');bg.addColorStop(1,'#A0845C')}
    C.fillStyle=bg;C.beginPath();C.roundRect(x,y,w,h,8);C.fill();

    // 大耳朵
    C.fillStyle='#C4A56A';
    C.beginPath();C.arc(x+7,y-3,10,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+w-7,y-3,10,0,Math.PI*2);C.fill();
    C.fillStyle='#FFB6C1';
    C.beginPath();C.arc(x+7,y-3,6,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+w-7,y-3,6,0,Math.PI*2);C.fill();

    // 眼睛
    const ey=y+11;
    C.fillStyle='#FFF';C.beginPath();C.arc(x+10,ey,8,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+w-10,ey,8,0,Math.PI*2);C.fill();
    C.fillStyle='#1a1a1a';C.beginPath();C.arc(x+11,ey,4,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+w-9,ey,4,0,Math.PI*2);C.fill();
    C.fillStyle='#FFF';C.beginPath();C.arc(x+13,ey-2,2,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+w-7,ey-2,2,0,Math.PI*2);C.fill();

    // 鼻子
    C.fillStyle='#FF69B4';C.beginPath();C.arc(x+w/2,ey+4,3.5,0,Math.PI*2);C.fill();
    // 胡须
    C.strokeStyle='#999';C.lineWidth=1;
    for(let s=-1;s<=1;s+=2){
      C.beginPath();C.moveTo(x+w/2,ey+4);C.lineTo(x+w/2+16*s,ey-2);C.stroke();
      C.beginPath();C.moveTo(x+w/2,ey+4);C.lineTo(x+w/2+14*s,ey+5);C.stroke();
    }

    // 肚子
    C.fillStyle='#F5DEB3';C.beginPath();C.ellipse(x+w/2,y+h-12,10,10,0,0,Math.PI*2);C.fill();

    // 尾巴
    C.strokeStyle='#C4A56A';C.lineWidth=3;C.lineCap='round';
    C.beginPath();C.moveTo(x+w/2,y+h-5);
    C.quadraticCurveTo(x+w/2+12,y+h+3,x+w/2+4+Math.sin(frame*0.2)*7,y+h+10);C.stroke();

    // 腿
    if(P.onGround){
      C.fillStyle='#A0845C';
      C.fillRect(x+5,y+h-4,8,6+Math.abs(Math.sin(frame*0.3))*5);
      C.fillRect(x+23,y+h-4,8,6+Math.abs(Math.cos(frame*0.3))*5);
    }
  }
}

  C.fillStyle='rgba(0,0,0,0.65)';C.fillRect(0,0,W,H);
  C.textAlign='center';
  C.fillStyle='#FFD700';C.font='bold 40px "Microsoft YaHei"';C.fillText('🐭 小鼠去旅行 🌍',W/2,H/2-95);
  C.fillStyle='#FFF';C.font='16px "Microsoft YaHei"';C.fillText('—— 环游世界的奇妙旅程 ——',W/2,H/2-50);

  C.fillStyle='#EEE';C.font='14px "Microsoft YaHei"';
  ['🎮  ← → 换跑道 | ↑/空格 跳跃(长按更高) | ↓/S 滑铲 | 双击空格二段跳',
   '⭐  收集金色星星触发连击倍率 | 道具：🛡护盾 🧲磁铁 ⚡加速 💎大礼包',
   '🏞  五段旅程：森林 → 沙漠 → 海洋 → 雪山 → 樱花小镇',
   '','按 空格键 出发！'].forEach((l,i)=>C.fillText(l,W/2,H/2-15+i*28));

  if(hiScore>0){C.fillStyle='#FFD700';C.font='bold 16px "Microsoft YaHei"';C.fillText(`🏆 最高分：${Math.floor(hiScore)}    ⭐ ${stars}`,W/2,H/2+160)}
}

function drawDeath(){
  C.fillStyle='rgba(0,0,0,0.7)';C.fillRect(0,0,W,H);
  C.textAlign='center';
  C.fillStyle='#FF6347';C.font='bold 36px "Microsoft YaHei"';C.fillText('旅途小憩...',W/2,H/2-55);
  C.fillStyle='#FFF';C.font='18px "Microsoft YaHei"';C.fillText(`得分：${Math.floor(score)}    距离：${Math.floor(distance)}米    ⭐${stars}`,W/2,H/2-8);
  C.fillText(`最高纪录：${Math.floor(hiScore)}`,W/2,H/2+25);
  if(score>=hiScore&&score>0){C.fillStyle='#FFD700';C.font='bold 22px "Microsoft YaHei"';C.fillText('🏆 新纪录！🏆',W/2,H/2-95)}
  C.fillStyle='#CCC';C.font='15px "Microsoft YaHei"';C.fillText('按 空格键 继续旅行！',W/2,H/2+60);
}

function draw(){
  C.clearRect(0,0,W,H);
  let sx=0,sy=0;if(shakeT>0){sx=(Math.random()-0.5)*shakeI*(shakeT/18);sy=(Math.random()-0.5)*shakeI*(shakeT/18)}
  C.save();C.translate(sx,sy);
  drawBg();drawCoins();drawPups();drawObs();drawParts();if(state!=='menu')drawPlayer();
  if(flashA>0){C.fillStyle=`rgba(255,255,255,${flashA})`;C.fillRect(0,0,W,H)}
  C.restore();
  if(state==='menu')drawMenu();
  if(state==='dead')drawDeath();
  if(state==='playing'||state==='dead')drawHUD();
}

// ==================== 输入 ====================
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();ia();
    if(state==='menu'){restart();return}if(state==='dead'){restart();return}
    if(state!=='playing')return;
    if(P.onGround){P.vy=JV;P.onGround=false;P.jumping=true;P.jh=20;jmp()}
    else if(P.dj&&P.djCd<=0){P.vy=JV*0.7;P.dj=false;P.djCd=25;jmp();emit(P.x+P.w/2,P.y+P.h,'#fff',8,3)}
  }
  if(state!=='playing')return;
  if(e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();
    if(P.onGround){P.vy=JV;P.onGround=false;P.jumping=true;P.jh=20;jmp()}
    else if(P.dj&&P.djCd<=0){P.vy=JV*0.7;P.dj=false;P.djCd=25;jmp();emit(P.x+P.w/2,P.y+P.h,'#fff',8,3)}
  }
  if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();if(P.onGround&&!P.sliding){P.sliding=true;P.slT=12;sld()}}
  if((e.code==='ArrowLeft'||e.code==='KeyA')&&P.lane>0){P.lane--;chg()}
  if((e.code==='ArrowRight'||e.code==='KeyD')&&P.lane<2){P.lane++;chg()}
});
window.addEventListener('keyup',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){P.jumping=false;P.jh=0}
  if(e.code==='ArrowDown'||e.code==='KeyS'){if(P.sliding){P.sliding=false;P.slT=0}}
});

cv.addEventListener('touchstart',e=>{e.preventDefault();ia();
  if(state==='menu'){restart();return}if(state==='dead'){restart();return}
  const t=e.touches[0],r=cv.getBoundingClientRect(),tx=t.clientX-r.left,ty=t.clientY-r.top,rx=tx/r.width,ry=ty/r.height;
  if(ry<0.45){if(P.onGround){P.vy=JV;P.onGround=false;P.jumping=true;P.jh=20;jmp()}else if(P.dj&&P.djCd<=0){P.vy=JV*0.7;P.dj=false;P.djCd=25;jmp();emit(P.x+P.w/2,P.y+P.h,'#fff',8,3)}}
  else if(ry>0.55){if(P.onGround&&!P.sliding){P.sliding=true;P.slT=12;sld()}}
  if(rx<0.3&&P.lane>0){P.lane--;chg()}if(rx>0.7&&P.lane<2){P.lane++;chg()}
});
cv.addEventListener('touchend',()=>{P.jumping=false;P.jh=0;if(P.sliding){P.sliding=false;P.slT=0}});
cv.addEventListener('click',()=>{ia();if(state==='menu'||state==='dead')restart()});

// ==================== 主循环 ====================
function loop(){update();draw();requestAnimationFrame(loop)}
P.x=LANES[1];P.tX=LANES[1];P.y=GROUND-P.h;
loop();
</script>
</body>
</html>
