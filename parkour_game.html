<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚀 喷气小鼠游欧洲</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Microsoft YaHei',sans-serif;}
#gc{position:relative;border:3px solid rgba(255,255,255,0.25);border-radius:14px;box-shadow:0 0 60px rgba(0,0,0,0.5)}
canvas{display:block;border-radius:11px;cursor:pointer}
</style>
</head>
<body>
<div id="gc"><canvas id="g"></canvas></div>
<script>
const W=1024,H=550;
const GROUND=425;
const LANES=[196,372,548];

// ==================== 音效 ====================
let actx;
function ia(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function sfx(f,t,d,m=1,s=0){if(!actx)return;const n=actx.currentTime;const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.setValueAtTime(f,n);if(s)o.frequency.linearRampToValueAtTime(f+s,n+d);g.gain.setValueAtTime(0.2*m,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+d)}
function se(f,t,d,s){sfx(f,t,d,1,s)}
function jmp(){se(500,'sine',0.1,300)}function sld(){se(100,'triangle',0.12)}function chg(){se(700,'sine',0.06)}function coinS(){se(1000,'sine',0.06);setTimeout(()=>se(1300,'sine',0.06),40)}function pwrS(){se(300,'sine',0.2,400)}function dieS(){se(60,'sawtooth',0.5)}function recS(){se(400,'square',0.08,300);setTimeout(()=>se(600,'square',0.08,300),80)}function envS(){se(200,'sine',0.15,300);setTimeout(()=>se(400,'sine',0.15,300),120);setTimeout(()=>se(600,'sine',0.15,300),240)}

const cv=document.getElementById('g');cv.width=W;cv.height=H;
const C=cv.getContext('2d');

// ==================== 场景 ====================
const SCENES=[
  {name:'阿尔卑斯草甸',start:0,
   imgs:['https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1024&h=550&fit=crop','https://images.unsplash.com/photo-1472396961693-142e6e269027?w=1024&h=550&fit=crop'],
   ground:'#5D8A3C',accent:'#90EE90',bfly:['#FF69B4','#FFD700','#FFF']},
  {name:'托斯卡纳丘陵',start:700,
   imgs:['https://images.unsplash.com/photo-1509316785289-025f1b1c5f2d?w=1024&h=550&fit=crop','https://images.unsplash.com/photo-1473580044384-7ba9967e16a0?w=1024&h=550&fit=crop'],
   ground:'#C4955A',accent:'#FFD700',bfly:['#FFD700','#FF8C00']},
  {name:'阿马尔菲海岸',start:1400,
   imgs:['https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1024&h=550&fit=crop','https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1024&h=550&fit=crop'],
   ground:'#6BAED6',accent:'#87CEEB',bfly:['#87CEEB','#FFF','#FFB6C1']},
  {name:'多洛米蒂雪峰',start:2100,
   imgs:['https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1024&h=550&fit=crop','https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1024&h=550&fit=crop'],
   ground:'#E8EDF2',accent:'#FFFFFF',bfly:['#FFF','#E0F0FF']},
  {name:'普罗旺斯花海',start:2800,
   imgs:['https://images.unsplash.com/photo-1499002238440-d264edd596ec?w=1024&h=550&fit=crop','https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=1024&h=550&fit=crop'],
   ground:'#9B7FB5',accent:'#FFB7C5',bfly:['#FF69B4','#9B30FF','#FFD700']}
];

const imgCache={};
SCENES.forEach(s=>s.imgs.forEach(url=>{if(!imgCache[url]){const img=new Image();img.crossOrigin='anonymous';img.onload=()=>imgCache[url]=img;img.onerror=()=>imgCache[url]=null;img.src=url}}));
function getSc(){for(let i=SCENES.length-1;i>=0;i--)if(distance>=SCENES[i].start)return SCENES[i];return SCENES[0]}
function getSi(){for(let i=SCENES.length-1;i>=0;i--)if(distance>=SCENES[i].start)return i;return 0}
function getImg(si){const s=SCENES[si];if(!s)return null;for(let u of s.imgs){if(imgCache[u]&&imgCache[u].complete&&imgCache[u].naturalWidth>0)return imgCache[u]}return null}

// ==================== 喷气背包跳跃物理（极慢下落） ====================
const JUMP_VEL=-6;        // 起跳初速度（降低→峰值3倍小鼠高）
const GRAVITY=0.14;       // 极低重力→峰值128px，下降很慢
const JUMP_HOLD=26;       // 长按喷气帧数
const JUMP_BOOST=0.2;     // 喷气推力
const COYOTE=12;          // 土狼时间
const JBUFFER=10;         // 跳跃缓冲
// 跳跃峰值高度：9.5²/(2×0.22)≈205px，小鼠42px→轻松越过障碍
// 滞空总时间：~1.4秒

// ==================== 状态 ====================
let state='menu';
let score=0,distance=0,hiScore=parseInt(localStorage.jetMouseHi)||0;
let frame=0,speed=1.8,baseSpeed=1.8;
let shakeT=0,shakeI=0,flashA=0;
let combo=0,comboT=0,stars=0;
let invT=0;
let release=false,releaseT=0;
let obsST=110,coinST=30;
let lastSi=-1;
let transA=0,transName='',transT=0;
let coyT=0,jbufT=0;

// ==================== 小鼠 ====================
const P={
  lane:1,tX:LANES[1],x:LANES[1],y:0,w:30,h:42,
  vy:0,onGround:true,
  sliding:false,slT:0,
  jumping:false,jh:0,
  shield:false,shT:0,
  magnet:false,mgT:0,
  boost:false,bsT:0,
  bobT:0,
  reset(){this.lane=1;this.tX=LANES[1];this.x=LANES[1];this.y=GROUND-this.h;this.vy=0;this.onGround=true;this.sliding=false;this.slT=0;this.jumping=false;this.jh=0;this.shield=false;this.shT=0;this.magnet=false;this.mgT=0;this.boost=false;this.bsT=0;this.bobT=0;}
};

let obs=[],coins=[],pups=[],parts=[],fgItems=[];

// ==================== 障碍物 ====================
const OBS={
  meadow:[
    {w:38,h:36,draw(x,y){C.fillStyle='#5C3317';C.fillRect(x+2,y+4,34,28);C.fillStyle='#8B6914';C.fillRect(x+4,y+6,30,24);C.strokeStyle='#3A1F0A';C.lineWidth=2;C.strokeRect(x+2,y+4,34,28)}},
    {w:30,h:42,draw(x,y){C.strokeStyle='#4A2A10';C.lineWidth=3;C.beginPath();C.moveTo(x+15,y+42);C.lineTo(x+15,y+14);C.stroke();C.fillStyle='#FF6347';C.beginPath();C.arc(x+15,y+7,16,Math.PI,0);C.fill();C.fillStyle='#FFF';C.beginPath();C.arc(x+7,y+2,5,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+23,y+3,5,0,Math.PI*2);C.fill()}}
  ],
  hill:[
    {w:28,h:52,draw(x,y){C.fillStyle='#556B2F';C.fillRect(x+9,y+2,10,50);C.fillRect(x+3,y+18,22,9);C.beginPath();C.arc(x+14,y+18,11,0,Math.PI*2);C.fill();C.fillRect(x-3,y+30,12,8);C.beginPath();C.arc(x+3,y+30,8,0,Math.PI*2);C.fill()}},
    {w:38,h:38,draw(x,y){const cx=x+19,cy=y+19;C.strokeStyle='#BDB76B';C.lineWidth=2;for(let a=0;a<8;a++)C.beginPath(),C.arc(cx+Math.cos(a*Math.PI/4+frame*0.04)*5,cy+Math.sin(a*Math.PI/4+frame*0.04)*5,13,0,Math.PI*1.8),C.stroke();C.fillStyle='#BDB76B';C.beginPath();C.arc(cx,cy,6,0,Math.PI*2);C.fill()}}
  ],
  coast:[
    {w:50,h:30,draw(x,y){C.fillStyle='#8B7355';C.beginPath();C.ellipse(x+25,y+15,25,15,0,0,Math.PI*2);C.fill();C.fillStyle='#A0845C';C.beginPath();C.ellipse(x+21,y+10,18,8,0,0,Math.PI*2);C.fill()}},
    {w:32,h:32,draw(x,y){C.fillStyle='#FFB6C1';C.beginPath();C.arc(x+16,y+16,16,0,Math.PI);C.fill();C.strokeStyle='#FF69B4';C.lineWidth=1;for(let i=0;i<8;i++)C.beginPath(),C.moveTo(x+16,y+16),C.lineTo(x+2+i*4,y+3),C.stroke()}}
  ],
  snow:[
    {w:46,h:30,draw(x,y){C.fillStyle='#F0F8FF';C.beginPath();C.ellipse(x+23,y+15,23,15,0,0,Math.PI*2);C.fill();C.fillStyle='#FFFFFF';C.beginPath();C.ellipse(x+19,y+10,16,8,0,0,Math.PI*2);C.fill()}},
    {w:30,h:46,draw(x,y){const g=C.createLinearGradient(x,y,x,y+46);g.addColorStop(0,'#E0F0FF');g.addColorStop(0.5,'#B0E0E6');g.addColorStop(1,'#87CEEB');C.fillStyle=g;for(let r=0;r<4;r++)C.fillRect(x+4+r*6,y+5+r*10,6,9);C.strokeStyle='rgba(255,255,255,0.4)';C.lineWidth=2;C.strokeRect(x+4,y+5,22,40)}}
  ],
  flower:[
    {w:50,h:32,draw(x,y){C.fillStyle='#DEB887';C.fillRect(x,y+20,50,4);C.fillRect(x,y+9,50,4);for(let p=0;p<5;p++){C.fillStyle='#DEB887';C.fillRect(x+4+p*12,y+2,4,24);C.fillStyle='#F5DEB3';C.beginPath();C.moveTo(x+6+p*12,y-2);C.lineTo(x+4+p*12,y+4);C.lineTo(x+8+p*12,y+4);C.closePath();C.fill()}}},
    {w:28,h:42,draw(x,y){C.fillStyle='#CD853F';C.beginPath();C.moveTo(x+3,y+18);C.lineTo(x,y+42);C.lineTo(x+28,y+42);C.lineTo(x+25,y+18);C.fill();C.fillStyle='#228B22';C.beginPath();C.arc(x+14,y+14,12,0,Math.PI);C.fill();C.fillStyle='#9B30FF';C.beginPath();C.arc(x+7,y+8,6,0,Math.PI*2);C.fill();C.beginPath();C.arc(x+21,y+9,6,0,Math.PI*2);C.fill();C.fillStyle='#FFD700';C.beginPath();C.arc(x+14,y+3,4,0,Math.PI*2);C.fill()}}
  ]
};
const OBS_KEYS=['meadow','hill','coast','snow','flower'];

function spawnObs(){const si=getSi(),tps=OBS[OBS_KEYS[si]]||OBS.meadow;const t=tps[Math.floor(Math.random()*tps.length)];const ln=Math.floor(Math.random()*3);obs.push({x:W,y:GROUND-t.h,w:t.w,h:t.h,draw:t.draw,ln,passed:false})}
function spCoins(ln,sx){for(let i=0;i<5;i++)coins.push({x:sx+i*30,y:GROUND-85-Math.sin(i*0.6)*35,w:14,h:14,rot:0})}
function spPup(tp){const cs={shield:'#4169E1',magnet:'#FFD700',boost:'#32CD32',star5:'#FF69B4'};pups.push({x:W,y:GROUND-85,w:22,h:22,type:tp,c:cs[tp],rot:0})}
function emit(x,y,c,n,spd){for(let i=0;i<n;i++)parts.push({x,y,c,vx:(Math.random()-0.5)*spd,vy:(Math.random()-0.5)*spd-Math.random()*3,life:1,dec:0.012+Math.random()*0.04,sz:1+Math.random()*3})}

function initFg(){fgItems=[];const si=getSi(),sc=SCENES[si];for(let i=0;i<28;i++)fgItems.push({t:'g',x:Math.random()*W,y:GROUND-2-Math.random()*8,s:0.6+Math.random()*0.6,sw:Math.random()*Math.PI*2,spd:0.9+Math.random()*0.1});for(let i=0;i<20;i++)fgItems.push({t:'f',x:Math.random()*W,y:GROUND-4-Math.random()*6,s:0.5+Math.random()*0.8,sw:Math.random()*Math.PI*2,c:sc.bfly[Math.floor(Math.random()*sc.bfly.length)],spd:0.85+Math.random()*0.1});for(let i=0;i<8;i++)fgItems.push({t:'r',x:Math.random()*W,y:GROUND-2,s:0.4+Math.random()*0.6,spd:0.92});for(let i=0;i<5;i++)fgItems.push({t:'bf',x:Math.random()*W,y:GROUND-130-Math.random()*200,vx:-0.3-Math.random()*0.5,vy:-0.2+Math.random()*0.4,sw:Math.random()*Math.PI*2,c:sc.bfly[Math.floor(Math.random()*sc.bfly.length)]});for(let i=0;i<3;i++)fgItems.push({t:'bd',x:Math.random()*W,y:40+Math.random()*120,vx:-0.3-Math.random()*0.5,vy:-0.1+Math.random()*0.2,sw:Math.random()*Math.PI*2})}

// ==================== 更新 ====================
function update(){
  if(state!=='playing')return;
  frame++;
  if(invT>0)invT--;if(P.shield){P.shT--;if(P.shT<=0)P.shield=false}if(P.magnet){P.mgT--;if(P.mgT<=0)P.magnet=false}if(P.boost){P.bsT--;if(P.bsT<=0)P.boost=false}

  // Coyote time + Jump buffer
  if(P.onGround)coyT=COYOTE;else if(coyT>0)coyT--;
  if(jbufT>0){jbufT--;if(P.onGround||coyT>0){doJump();jbufT=0}}

  // 场景
  const si=getSi();if(si!==lastSi&&lastSi>=0){const sc=SCENES[si];transA=1;transName=sc.name;transT=100;initFg();envS()}lastSi=si;if(transT>0){transT--;transA=Math.max(0,transT/100)}
  if(P.onGround&&!P.sliding)P.bobT+=speed*0.12;

  // 速度
  const ph=Math.min(si,4);const sr=[[1.8,3],[2.2,3.8],[2.8,4.5],[3.2,5.2],[3.8,5.8]][ph];
  const ts=sr[0]+(sr[1]-sr[0])*Math.min(distance/3500,1);
  if(release)baseSpeed+=(sr[0]-baseSpeed)*0.02;else baseSpeed+=(ts-baseSpeed)*0.002;
  speed=baseSpeed+(P.boost?2:0);
  distance+=speed*0.2;score+=1+combo*0.3;
  if(shakeT>0)shakeT--;if(flashA>0)flashA-=0.04;

  // === 喷气跳跃物理（极慢下落） ===
  if(P.jumping&&P.jh>0&&P.vy<0){P.jh--;P.vy-=JUMP_BOOST}
  P.vy+=GRAVITY;
  P.y+=P.vy;
  if(P.y>=GROUND-P.h){P.y=GROUND-P.h;P.vy=0;if(!P.onGround){P.onGround=true;P.jumping=false}}else{P.onGround=false}

  // 滑铲
  if(P.sliding){P.slT--;P.h=24;if(P.slT<=0){P.sliding=false;P.h=42}}if(!P.sliding)P.h=42;if(P.sliding)P.y=GROUND-P.h;
  P.tX=LANES[P.lane];P.x+=(P.tX-P.x)*0.2;

  // 近景
  fgItems.forEach(it=>{if(it.t==='bf'||it.t==='bd'){it.x+=it.vx;it.y+=it.vy+Math.sin(frame*0.03+it.sw)*0.3;it.sw+=0.02;if(it.x<-40)it.x=W+40;if(it.y<10||it.y>GROUND-20)it.vy*=-1}else{it.x-=speed*it.spd;if(it.x<-20)it.x=W+20+Math.random()*40;it.sw+=0.05}});

  // 障碍
  obsST--;if(obsST<=0){spawnObs();obsST=120+Math.floor(Math.random()*90);if(release)obsST+=140}
  obs.forEach(o=>o.x-=speed);obs=obs.filter(o=>o.x>-80);

  // 金币
  coinST--;if(coinST<=0){spCoins(Math.floor(Math.random()*3),W);coinST=40+Math.floor(Math.random()*40)}
  coins.forEach(c=>c.x-=speed);if(P.magnet)coins.forEach(c=>{const dx=P.x+P.w/2-c.x,dy=P.y+P.h/2-c.y,d=Math.sqrt(dx*dx+dy*dy);if(d<160){c.x+=dx/d*5;c.y+=dy/d*5}});coins=coins.filter(c=>c.x>-30);

  // 道具
  if(release&&releaseT<8&&Math.random()<0.008&&pups.length<2)spPup(['shield','magnet','boost','star5'][Math.floor(Math.random()*4)]);
  pups.forEach(p=>p.x-=speed);pups=pups.filter(p=>p.x>-30);

  if(!release&&Math.floor(distance)%650<4&&distance>60){release=true;releaseT=140}if(release){releaseT--;if(releaseT<=0)release=false}

  // 碰撞
  const mx=P.w*0.3,my=P.h*0.3;const px=P.x+mx,py=P.y+my,pw=P.w-mx*2,phh=P.h-my*2;
  for(let o of obs){if(px<o.x+o.w-3&&px+pw>o.x+3&&py<o.y+o.h-3&&py+phh>o.y+3){if(invT>0)continue;if(P.shield){P.shield=false;P.shT=0;emit(o.x+o.w/2,o.y+o.h/2,'#4169E1',18,5);return}die();return}}

  // 收集
  for(let i=coins.length-1;i>=0;i--){const c=coins[i];if(Math.abs(P.x+P.w/2-c.x)<26&&Math.abs(P.y+P.h/2-c.y)<30){coins.splice(i,1);combo++;comboT=80;score+=10*Math.min(combo,8);stars++;coinS();emit(c.x,c.y,'#FFD700',5,2)}}
  for(let i=pups.length-1;i>=0;i--){const p=pups[i];if(Math.abs(P.x+P.w/2-p.x)<26&&Math.abs(P.y+P.h/2-p.y)<26){const t=p.type;pups.splice(i,1);pwrS();emit(p.x,p.y,p.c,12,4);if(t==='shield'){P.shield=true;P.shT=400}if(t==='magnet'){P.magnet=true;P.mgT=400}if(t==='boost'){P.boost=true;P.bsT=240}if(t==='star5'){stars+=5;score+=80}}}
  if(comboT>0){comboT--;if(comboT<=0)combo=0}obs.forEach(o=>{if(!o.passed&&o.x+o.w<P.x){o.passed=true;score+=3}});
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=p.dec});parts=parts.filter(p=>p.life>0);
}

function doJump(){if(!P.onGround&&coyT<=0)return;P.vy=JUMP_VEL;P.onGround=false;P.jumping=true;P.jh=JUMP_HOLD;jmp();emit(P.x+P.w/2,P.y+P.h,'#fff',8,3)}
function die(){state='dead';dieS();shakeT=18;shakeI=7;flashA=0.5;emit(P.x+P.w/2,P.y+P.h/2,'#FF6347',45,8);if(score>hiScore){hiScore=Math.floor(score);localStorage.jetMouseHi=hiScore;recS()}}
function restart(){score=0;distance=0;speed=1.8;baseSpeed=1.8;frame=0;lastSi=0;transA=0;transT=0;combo=0;comboT=0;stars=0;invT=120;release=false;releaseT=0;coyT=0;jbufT=0;obs=[];coins=[];pups=[];parts=[];obsST=100;coinST=25;initFg();P.reset();P.lane=1;P.x=LANES[1];P.tX=LANES[1];P.y=GROUND-P.h;state='playing'}

// ==================== 渲染 ====================
function drawBg(){
  const si=getSi(),sc=SCENES[si],img=getImg(si);
  if(img)C.drawImage(img,0,0,W,H),C.fillStyle='rgba(255,255,255,0.03)',C.fillRect(0,0,W,H);
  else{const g=C.createLinearGradient(0,0,0,GROUND);if(si===0)g.addColorStop(0,'#87CEEB'),g.addColorStop(0.5,'#B8E8C0'),g.addColorStop(1,'#7BAE5A');else if(si===1)g.addColorStop(0,'#FFDAB9'),g.addColorStop(0.5,'#FFE8C0'),g.addColorStop(1,'#D4A856');else if(si===2)g.addColorStop(0,'#4682B4'),g.addColorStop(0.5,'#87CEEB'),g.addColorStop(1,'#6BAED6');else if(si===3)g.addColorStop(0,'#B0C4DE'),g.addColorStop(0.5,'#D8E8F0'),g.addColorStop(1,'#E8EDF2');else g.addColorStop(0,'#FFE4E1'),g.addColorStop(0.5,'#FFD1DC'),g.addColorStop(1,'#9B7FB5');C.fillStyle=g;C.fillRect(0,0,W,H)}

  const gg=C.createLinearGradient(0,GROUND,0,H);gg.addColorStop(0,sc.ground);gg.addColorStop(0.12,'rgba(0,0,0,0.22)');gg.addColorStop(1,'rgba(0,0,0,0.5)');C.fillStyle=gg;C.fillRect(0,GROUND,W,H-GROUND);
  C.strokeStyle='rgba(255,255,255,0.1)';C.lineWidth=2;C.beginPath();C.moveTo(0,GROUND);C.lineTo(W,GROUND);C.stroke();

  // 中景
  for(let i=0;i<14;i++){const bx=((i*85-frame*speed*0.1)%(W+100))-50;C.fillStyle=sc.accent;C.globalAlpha=0.25;C.beginPath();C.arc(bx,GROUND-12-((i*14)%8),5,0,Math.PI*2);C.fill();C.globalAlpha=1}

  // 近景元素
  fgItems.forEach(it=>{
    if(it.t==='g'){C.strokeStyle=sc.accent;C.lineWidth=1.5;C.globalAlpha=0.45;const sw=Math.sin(it.sw)*3;C.beginPath();C.moveTo(it.x,it.y);C.quadraticCurveTo(it.x+sw,it.y-8*it.s,it.x+sw*1.5,it.y-15*it.s);C.stroke();C.globalAlpha=1}
    else if(it.t==='f'){C.fillStyle=it.c;C.globalAlpha=0.5;C.beginPath();C.arc(it.x+Math.sin(it.sw)*2,it.y-3*it.s,3*it.s,0,Math.PI*2);C.fill();C.globalAlpha=1}
    else if(it.t==='r'){C.fillStyle='rgba(150,140,130,0.35)';C.beginPath();C.ellipse(it.x,it.y,5*it.s,3*it.s,0,0,Math.PI*2);C.fill()}
    else if(it.t==='bf'){C.fillStyle=it.c;C.globalAlpha=0.5;C.beginPath();C.arc(it.x,it.y,3.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(it.x-4,it.y-2,2.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(it.x+4,it.y-2,2.5,0,Math.PI*2);C.fill();C.globalAlpha=1}
    else if(it.t==='bd'){C.strokeStyle='#333';C.lineWidth=2;C.globalAlpha=0.3;C.beginPath();C.moveTo(it.x-6,it.y);C.quadraticCurveTo(it.x,it.y-3,it.x+6,it.y);C.stroke();C.globalAlpha=1}
  });

  if(transA>0){C.fillStyle=`rgba(255,255,255,${transA})`;C.fillRect(0,0,W,H)}if(transA>0.3){C.fillStyle=`rgba(0,0,0,${(transA-0.3)*1.4})`;C.textAlign='center';C.font='bold 26px "Microsoft YaHei"';C.fillText(`📍 ${transName}`,W/2,H/2-20)}
}

function drawPlayer(){
  const {x,y,w,h,sliding,shield,boost,magnet}=P,bob=sliding?0:Math.sin(P.bobT)*3;
  const px=x,py=y+bob,jetting=P.jumping&&P.jh>0;

  if(shield){C.strokeStyle=`rgba(65,105,225,${0.35+Math.sin(frame*0.2)*0.3})`;C.lineWidth=3;C.beginPath();C.arc(px+w/2,py+h/2,32,0,Math.PI*2);C.stroke()}

  // 喷气火焰
  if(jetting&&!sliding){const fs=5+Math.random()*5;C.fillStyle=`rgba(255,${80+Math.random()*100},0,0.8)`;C.beginPath();C.arc(px+w/2,py+h+3,fs*0.6,0,Math.PI*2);C.fill();C.fillStyle=`rgba(255,${160+Math.random()*95},40,0.85)`;C.beginPath();C.arc(px+w/2,py+h,fs*0.35,0,Math.PI*2);C.fill();C.fillStyle='rgba(255,255,200,0.6)';C.beginPath();C.arc(px+w/2,py+h-1,fs*0.15,0,Math.PI*2);C.fill()}

  if(sliding){C.fillStyle='#C4A56A';C.beginPath();C.ellipse(px+w/2,py+h/2,w/2,h/2,0,0,Math.PI*2);C.fill();C.fillStyle='#A0845C';C.beginPath();C.arc(px+8,py+2,6,0,Math.PI*2);C.fill();C.beginPath();C.arc(px+w-8,py+2,6,0,Math.PI*2);C.fill()}else{
    const bg=C.createLinearGradient(px,py,px,py+h);if(boost){bg.addColorStop(0,'#FFD700');bg.addColorStop(1,'#FF8C00')}else if(magnet){bg.addColorStop(0,'#FFB347');bg.addColorStop(1,'#CD853F')}else{bg.addColorStop(0,'#DEB887');bg.addColorStop(0.7,'#C4A56A');bg.addColorStop(1,'#A0845C')}
    C.fillStyle=bg;C.beginPath();C.roundRect(px,py,w,h,8);C.fill();
    const ew=Math.sin(P.bobT*1.5)*3;C.fillStyle='#C4A56A';C.beginPath();C.arc(px+6,py-3+ew*0.3,9,0,Math.PI*2);C.fill();C.beginPath();C.arc(px+w-6,py-3-ew*0.3,9,0,Math.PI*2);C.fill();C.fillStyle='#FFB6C1';C.beginPath();C.arc(px+6,py-3+ew*0.3,5.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(px+w-6,py-3-ew*0.3,5.5,0,Math.PI*2);C.fill();
    const ey=py+13;C.fillStyle='#FFF';C.beginPath();C.arc(px+10,ey,7.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(px+w-10,ey,7.5,0,Math.PI*2);C.fill();C.fillStyle='#1a1a1a';C.beginPath();C.arc(px+11,ey,3.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(px+w-9,ey,3.5,0,Math.PI*2);C.fill();C.fillStyle='#FFF';C.beginPath();C.arc(px+13,ey-3,2,0,Math.PI*2);C.fill();C.beginPath();C.arc(px+w-7,ey-3,2,0,Math.PI*2);C.fill();
    C.fillStyle='#FF69B4';C.beginPath();C.arc(px+w/2,ey+4,3.5,0,Math.PI*2);C.fill();C.strokeStyle='#AAA';C.lineWidth=1;for(let s=-1;s<=1;s+=2){C.beginPath();C.moveTo(px+w/2,ey+4);C.lineTo(px+w/2+15*s,ey);C.stroke();C.beginPath();C.moveTo(px+w/2,ey+4);C.lineTo(px+w/2+13*s,ey+6);C.stroke()}
    C.fillStyle='#708090';C.beginPath();C.roundRect(px+3,py+h-17,w-6,11,4);C.fill();C.fillStyle='#A0B0C0';C.beginPath();C.roundRect(px+5,py+h-15,w-10,7,3);C.fill();C.fillStyle='#505860';C.fillRect(px+w/2-3,py+h-4,6,5);C.fillStyle='#FF4500';C.beginPath();C.arc(px+w/2,py+h+1,2.5,0,Math.PI*2);C.fill();
    C.fillStyle='#F5DEB3';C.beginPath();C.ellipse(px+w/2,py+h-20,8,8,0,0,Math.PI*2);C.fill();
    const as=Math.sin(P.bobT)*9;C.fillStyle='#C4A56A';C.beginPath();C.ellipse(px+3+as*0.6,py+22,5,7,0.2,0,Math.PI*2);C.fill();C.beginPath();C.ellipse(px+w-3-as*0.6,py+22,5,7,-0.2,0,Math.PI*2);C.fill();
    C.strokeStyle='#C4A56A';C.lineWidth=3;C.lineCap='round';C.beginPath();C.moveTo(px+w/2,py+h-5);C.quadraticCurveTo(px+w/2+14,py+h+4,px+w/2+5+Math.sin(P.bobT*1.3)*10,py+h+13);C.stroke();
    if(P.onGround){C.fillStyle='#A0845C';C.fillRect(px+4,py+h-4,7,6+Math.abs(Math.sin(P.bobT))*5);C.fillRect(px+19,py+h-4,7,6+Math.abs(Math.cos(P.bobT))*5)}
  }
}

function drawObs(){obs.forEach(o=>{C.save();o.draw(o.x,o.y);C.restore()})}
function drawCoins(){coins.forEach(c=>{C.save();C.translate(c.x,c.y);C.fillStyle='#FFD700';C.beginPath();C.moveTo(0,-7);C.lineTo(3,-3);C.lineTo(7,-1);C.lineTo(3,3);C.lineTo(4,7);C.lineTo(0,4);C.lineTo(-4,7);C.lineTo(-3,3);C.lineTo(-7,-1);C.lineTo(-3,-3);C.closePath();C.fill();C.restore()})}
function drawPups(){pups.forEach(p=>{C.save();C.translate(p.x+p.w/2,p.y+p.h/2);C.rotate(p.rot);const g=C.createRadialGradient(0,0,3,0,0,13);g.addColorStop(0,'#FFF');g.addColorStop(1,p.c);C.fillStyle=g;C.fillRect(-11,-11,22,22);C.fillStyle='#FFF';C.font='11px Arial';C.fillText({shield:'🛡',magnet:'🧲',boost:'⚡',star5:'⭐'}[p.type],-6,4);C.restore()})}
function drawParts(){parts.forEach(p=>{C.globalAlpha=p.life;C.fillStyle=p.c;C.beginPath();C.arc(p.x,p.y,p.sz,0,Math.PI*2);C.fill()});C.globalAlpha=1}

function drawHUD(){const sc=getSc();C.textAlign='left';C.fillStyle='rgba(0,0,0,0.5)';C.roundRect(10,8,145,50,8);C.fill();C.fillStyle='#FFF';C.font='bold 16px "Microsoft YaHei"';C.fillText(`📍 ${sc.name}`,20,30);C.fillStyle='#FFD700';C.font='11px "Microsoft YaHei"';C.fillText(`⭐${stars}  📏${Math.floor(distance)}米`,20,50);C.textAlign='right';C.fillStyle='rgba(0,0,0,0.5)';C.roundRect(W-130,8,120,28,8);C.fill();C.fillStyle='#FFD700';C.font='bold 14px "Microsoft YaHei"';C.fillText(`🏆 ${Math.floor(hiScore)}`,W-18,30);if(combo>=5){C.textAlign='center';C.fillStyle='#FF6347';C.font=`bold ${Math.min(16+combo,34)}px "Microsoft YaHei"`;C.fillText(`⭐ x${Math.min(combo,8)}!`,W/2,GROUND-70)}C.textAlign='left';if(P.shield)C.fillText(`🛡${Math.ceil(P.shT/60)}s`,20,GROUND-18);if(P.magnet)C.fillText(`🧲${Math.ceil(P.mgT/60)}s`,80,GROUND-18);if(P.boost)C.fillText(`⚡${Math.ceil(P.bsT/60)}s`,140,GROUND-18);if(release){C.textAlign='center';C.fillStyle='#FFD700';C.font='bold 14px "Microsoft YaHei"';C.fillText('🌟 风景段！🌟',W/2,GROUND-40)}}

function drawMenu(){C.fillStyle='rgba(0,0,0,0.75)';C.fillRect(0,0,W,H);C.textAlign='center';C.fillStyle='#FFD700';C.font='bold 40px "Microsoft YaHei"';C.fillText('🚀 喷气小鼠游欧洲 🌍',W/2,H/2-115);C.fillStyle='#FFF';C.font='15px "Microsoft YaHei"';C.fillText('—— 喷气背包慢跳 · 看遍欧洲风景 ——',W/2,H/2-72);C.fillStyle='#EEE';C.font='13px "Microsoft YaHei"';['🎮 ← → 换道 | 按住空格喷气跳跃 | ↓/S 滑铲','🚀 喷气背包让小鼠缓慢飘落 · 给你充足反应时间','⭐ 收集星星 | 🛡🧲⚡💎 四种道具','🏞 草甸→丘陵→海岸→雪峰→花海 | 🖼 Unsplash高清风景','','按住 空格键 出发！'].forEach((l,i)=>C.fillText(l,W/2,H/2-32+i*26));if(hiScore>0){C.fillStyle='#FFD700';C.font='bold 14px "Microsoft YaHei"';C.fillText(`🏆 最高分：${Math.floor(hiScore)}    ⭐ ${stars}`,W/2,H/2+160)}}

function drawDeath(){C.fillStyle='rgba(0,0,0,0.75)';C.fillRect(0,0,W,H);C.textAlign='center';C.fillStyle='#FF6347';C.font='bold 32px "Microsoft YaHei"';C.fillText('旅途小憩...',W/2,H/2-50);C.fillStyle='#FFF';C.font='16px "Microsoft YaHei"';C.fillText(`得分：${Math.floor(score)}    距离：${Math.floor(distance)}米    ⭐${stars}`,W/2,H/2-5);C.fillText(`最高纪录：${Math.floor(hiScore)}`,W/2,H/2+25);if(score>=hiScore&&score>0){C.fillStyle='#FFD700';C.font='bold 20px "Microsoft YaHei"';C.fillText('🏆 新纪录！🏆',W/2,H/2-85)}C.fillStyle='#CCC';C.font='14px "Microsoft YaHei"';C.fillText('按住 空格键 重新出发！',W/2,H/2+60)}

function draw(){C.clearRect(0,0,W,H);let sx=0,sy=0;if(shakeT>0){sx=(Math.random()-0.5)*shakeI*(shakeT/18);sy=(Math.random()-0.5)*shakeI*(shakeT/18)}C.save();C.translate(sx,sy);drawBg();drawCoins();drawPups();drawObs();drawParts();if(state!=='menu')drawPlayer();if(flashA>0){C.fillStyle=`rgba(255,255,255,${flashA})`;C.fillRect(0,0,W,H)}C.restore();if(state==='menu')drawMenu();if(state==='dead')drawDeath();if(state==='playing'||state==='dead')drawHUD()}

// ==================== 输入 ====================
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();ia();if(state==='menu'){restart();return}if(state==='dead'){restart();return}if(state!=='playing')return;if(P.onGround||coyT>0)doJump();else jbufT=JBUFFER}
  if(state!=='playing')return;if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();if(P.onGround&&!P.sliding){P.sliding=true;P.slT=14;sld()}}if((e.code==='ArrowLeft'||e.code==='KeyA')&&P.lane>0){P.lane--;chg()}if((e.code==='ArrowRight'||e.code==='KeyD')&&P.lane<2){P.lane++;chg()}
});
window.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){P.jumping=false;P.jh=0}if(e.code==='ArrowDown'||e.code==='KeyS'){if(P.sliding){P.sliding=false;P.slT=0}}});

cv.addEventListener('touchstart',e=>{e.preventDefault();ia();if(state==='menu'){restart();return}if(state==='dead'){restart();return}const t=e.touches[0],r=cv.getBoundingClientRect(),tx=t.clientX-r.left,ty=t.clientY-r.top,rx=tx/r.width,ry=ty/r.height;if(ry<0.5){if(P.onGround||coyT>0)doJump();else jbufT=JBUFFER}else{if(P.onGround&&!P.sliding){P.sliding=true;P.slT=14;sld()}}if(rx<0.3&&P.lane>0){P.lane--;chg()}if(rx>0.7&&P.lane<2){P.lane++;chg()}});
cv.addEventListener('touchend',()=>{P.jumping=false;P.jh=0;if(P.sliding){P.sliding=false;P.slT=0}});
cv.addEventListener('click',()=>{ia();if(state==='menu'||state==='dead')restart()});

function loop(){update();draw();requestAnimationFrame(loop)}
P.x=LANES[1];P.tX=LANES[1];P.y=GROUND-P.h;initFg();loop();
</script>
