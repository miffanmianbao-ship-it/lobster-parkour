<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚂 上海→拉萨 · 风景列车</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Microsoft YaHei',sans-serif;}
#gc{position:relative;border-radius:14px;overflow:hidden;box-shadow:0 0 80px rgba(0,0,0,0.6)}
canvas{display:block}
</style>
</head>
<body><div id="gc"><canvas id="g"></canvas></div>
<script>
const W=1100,H=600,GROUND=500;
const cv=document.getElementById('g');cv.width=W;cv.height=H;
const C=cv.getContext('2d');

// ==================== 北京时间 ====================
function getBJ(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Shanghai'}))}
function getH(){return getBJ().getHours()+getBJ().getMinutes()/60}

function getLight(){
  const h=getH();
  if(h>=5&&h<7)return{nm:'黎明',sk:['#1A1030','#4A2050','#D89060'],sa:0.3,br:0.45,cl:'#FFD0A0',overlay:'rgba(255,200,150,0.15)'};
  if(h>=7&&h<9)return{nm:'清晨',sk:['#6BB5E0','#B8D8F0','#FFF8E0'],sa:0,br:0.75,cl:'#FFF8E0',overlay:'rgba(255,248,224,0.08)'};
  if(h>=9&&h<16)return{nm:'白天',sk:['#4A90D9','#87CEEB','#E8F0FF'],sa:0,br:1,cl:'#FFFFFF',overlay:'rgba(255,255,255,0)'};
  if(h>=16&&h<18)return{nm:'下午',sk:['#5BA0D0','#C8D8E8','#FFE0C0'],sa:0,br:0.9,cl:'#FFE8C0',overlay:'rgba(255,220,180,0.08)'};
  if(h>=18&&h<20)return{nm:'黄昏',sk:['#2A1850','#7040A0','#FF9050'],sa:0.15,br:0.55,cl:'#FFB080',overlay:'rgba(255,150,80,0.2)'};
  return{nm:'夜晚',sk:['#050515','#0A0A30','#101040'],sa:1,br:0.2,cl:'#202040',overlay:'rgba(10,10,40,0.5)'};
}

// ==================== 风景图库（每段6-8张Unsplash高清图） ====================
const PHOTOS={
  plains:[ // 平原/稻田/水乡
    'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1472396961693-142e6e269027?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1530908295418-a12e326966ba?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1518173946687-a1e4e3b544f5?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1100&h=600&fit=crop',
  ],
  hills:[ // 丘陵/山地
    'https://images.unsplash.com/photo-1509316785289-025f1b1c5f2d?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1473580044384-7ba9967e16a0?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1504196606672-aef5c9cefc92?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1523531294919-4bcd7c65e216?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1100&h=600&fit=crop',
  ],
  plateau:[ // 高原/黄土/草原
    'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1506197603052-3cc9c3a201bd?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1454496522488-7a8e488e8606?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1500534623283-312aade485b7?w=1100&h=600&fit=crop',
  ],
  snow:[ // 雪山
    'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1454496522488-7a8e488e8606?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1500534623283-312aade485b7?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1487730116645-74489a95b41b?w=1100&h=600&fit=crop',
  ],
  flower:[ // 花海/拉萨
    'https://images.unsplash.com/photo-1499002238440-d264edd596ec?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1497436072909-60f360e1d4b1?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1522383225653-ed111181a951?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1490750967868-88aa4f44baee?w=1100&h=600&fit=crop',
    'https://images.unsplash.com/photo-1444021465936-c6a3b2d8e732?w=1100&h=600&fit=crop',
  ]
};

// 预加载
const imgCache={};
Object.values(PHOTOS).forEach(arr=>arr.forEach(url=>{
  if(!imgCache[url]){const img=new Image();img.crossOrigin='anonymous';img.onload=()=>imgCache[url]=img;img.onerror=()=>imgCache[url]=null;img.src=url}
}));

// ==================== 路线 ====================
const ROUTE=[
  {name:'上海出发',km:0,desc:'华东平原·稻田水乡',photos:PHOTOS.plains},
  {name:'南京—郑州',km:300,desc:'江淮丘陵·黄河两岸',photos:PHOTOS.hills},
  {name:'西安—兰州',km:600,desc:'黄土高原·千沟万壑',photos:PHOTOS.plateau},
  {name:'西宁—格尔木',km:900,desc:'青海草原·盐湖如镜',photos:PHOTOS.plateau},
  {name:'格尔木—唐古拉',km:1200,desc:'可可西里·雪山初现',photos:PHOTOS.snow},
  {name:'唐古拉山口',km:1500,desc:'世界屋脊·冰川雪峰',photos:PHOTOS.snow},
  {name:'那曲—当雄',km:1800,desc:'羌塘草原·牦牛遍野',photos:PHOTOS.plateau},
  {name:'拉萨',km:2100,desc:'圣地拉萨·阳光之城',photos:PHOTOS.flower}
];

let journeyPos=0,trainSpeed=2.0,targetSpd=2.0,stopped=false,stopT=0,stName='',frame=0;
let photoIdx=0,photoTimer=0,photoFade=0,nextPhoto=null; // 图片切换系统

function getSeg(){for(let i=ROUTE.length-1;i>=0;i--)if(journeyPos>=ROUTE[i].km)return ROUTE[i];return ROUTE[0]}

function updateTrain(){
  frame++;
  if(!stopped&&Math.random()<0.0004){stopped=true;stopT=200+Math.floor(Math.random()*300);stName=['苏州站','南京站','郑州站','西安站','兰州站','西宁站','格尔木站','那曲站','当雄站'][Math.floor(Math.random()*9)];targetSpd=0}
  if(stopped){stopT--;if(stopT<=0){stopped=false;targetSpd=1.5+Math.random()*2.5;stName=''}}else{if(Math.random()<0.002)targetSpd=1.2+Math.random()*2.8}
  trainSpeed+=(targetSpd-trainSpeed)*0.02;
  if(trainSpeed>0.1)journeyPos+=trainSpeed*0.15;
  if(journeyPos>ROUTE[ROUTE.length-1].km+300)journeyPos=0;

  // 图片切换：每4-7秒切换到下一张
  photoTimer++;
  const seg=getSeg();
  const dur=200+Math.floor(Math.random()*200); // 4-7秒
  if(photoTimer>dur&&seg.photos.length>1){
    photoTimer=0;photoFade=0;
    photoIdx=(photoIdx+1)%seg.photos.length;
  }
  if(photoFade<1)photoFade=Math.min(1,photoFade+0.015);
}

// ==================== 绘制 ====================
function drawBg(light){
  const seg=getSeg();
  const curImg=imgCache[seg.photos[photoIdx]];
  const nxtIdx=(photoIdx+1)%seg.photos.length;
  const nxtImg=imgCache[seg.photos[nxtIdx]];

  // 当前图片（带缓慢平移动画）
  if(curImg&&curImg.complete&&curImg.naturalWidth>0){
    const pan=Math.sin(frame*0.0003)*15;
    C.globalAlpha=1;C.drawImage(curImg,-20+pan,0,W+40,H);
  }

  // 下一张图片淡入
  if(nxtImg&&nxtImg!==curImg&&nxtImg.complete&&nxtImg.naturalWidth>0&&photoFade<1){
    C.globalAlpha=photoFade;C.drawImage(nxtImg,0,0,W,H);C.globalAlpha=1;
  }

  // 没有图片时用渐变
  if(!curImg||!curImg.complete){const g=C.createLinearGradient(0,0,0,H);g.addColorStop(0,light.sk[0]);g.addColorStop(0.5,light.sk[1]);g.addColorStop(1,light.sk[2]);C.fillStyle=g;C.fillRect(0,0,W,H)}

  // 光影叠加
  C.fillStyle=light.overlay;C.fillRect(0,0,W,H);

  // 星空
  if(light.sa>0){for(let i=0;i<60;i++){const sx=(i*173)%W,sy=(i*97)%(H*0.4);C.fillStyle=`rgba(255,255,255,${(0.3+Math.sin(frame*0.02+i)*0.3)*light.sa})`;C.fillRect(sx,sy,1.5,1.5)}}

  // 前景运动（电线杆/树，快速滚动制造流动感）
  C.globalAlpha=0.5*light.br;
  for(let i=0;i<15;i++){
    const nx=((i*130+journeyPos*40*0.9)%(W+200))-100;
    const ny=GROUND-30-Math.sin(i*2.7)*15;
    C.strokeStyle='#444';C.lineWidth=2;
    C.beginPath();C.moveTo(nx,ny);C.lineTo(nx,ny-40-Math.sin(i)*15);C.stroke();
    if(i%3===0){C.fillStyle='#2D5A1E';C.beginPath();C.arc(nx,ny-40-Math.sin(i)*15,8,0,Math.PI*2);C.fill()}
  }
  // 近处草丛
  for(let i=0;i<35;i++){
    const gx=((i*55+journeyPos*40*0.95)%(W+100))-50;
    C.strokeStyle=i%3===0?'#6B8E4A':'#8BAA6A';C.lineWidth=1.5;
    C.beginPath();C.moveTo(gx,GROUND);C.quadraticCurveTo(gx+Math.sin(frame*0.05+i)*3,GROUND-10,gx+Math.sin(frame*0.05+i)*4,GROUND-18);C.stroke();
  }
  C.globalAlpha=1;
}

function drawTrain(light){
  // 窗帘
  C.fillStyle='#6B5040';C.fillRect(0,0,45,H);C.fillRect(W-45,0,45,H);
  C.fillStyle='#8B6F5E';C.fillRect(0,0,45,H*0.3);C.fillRect(W-45,0,45,H*0.3);
  for(let y=0;y<H*0.3;y+=18){C.strokeStyle='#5C3A28';C.lineWidth=1;C.beginPath();C.moveTo(0,y);C.lineTo(45,y);C.stroke();C.beginPath();C.moveTo(W-45,y);C.lineTo(W,y);C.stroke()}

  // 窗框
  C.strokeStyle='#4A2A18';C.lineWidth=10;C.strokeRect(42,2,W-84,H-4);
  C.strokeStyle='#2A1008';C.lineWidth=3;C.strokeRect(40,0,W-80,H);

  // 窗台
  C.fillStyle='#4A2A18';C.fillRect(0,H-35,W,35);
  C.fillStyle='#6B4A30';C.fillRect(0,H-35,W,3);

  // 小桌板+茶杯
  C.fillStyle='#6B4A30';C.fillRect(W-220,H-55,170,4);C.fillStyle='#5C3A20';C.fillRect(W-220,H-51,170,2);
  C.fillStyle='#F5F5DC';C.beginPath();C.arc(W-175,H-65,11,0,Math.PI*2);C.fill();
  C.fillStyle='#E0D0B8';C.beginPath();C.arc(W-175,H-65,8,0,Math.PI*2);C.fill();
  if(Math.random()>0.3){C.fillStyle='rgba(255,255,255,0.3)';C.beginPath();C.arc(W-175,H-77,3+Math.sin(frame*0.1)*2,0,Math.PI*2);C.fill();C.arc(W-173,H-85,2,0,Math.PI*2);C.fill()}
}

function drawMouse(){
  const mx=W-165,my=H-80;
  C.fillStyle='#DEB887';C.beginPath();C.roundRect(mx,my,22,28,6);C.fill();
  C.fillStyle='#C4A56A';C.beginPath();C.arc(mx+5,my-1,7,0,Math.PI*2);C.fill();C.beginPath();C.arc(mx+17,my-1,7,0,Math.PI*2);C.fill();
  C.fillStyle='#FFB6C1';C.beginPath();C.arc(mx+5,my-1,4,0,Math.PI*2);C.fill();C.beginPath();C.arc(mx+17,my-1,4,0,Math.PI*2);C.fill();
  C.fillStyle='#FFF';C.beginPath();C.arc(mx+7,my+9,5.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(mx+15,my+9,5.5,0,Math.PI*2);C.fill();
  C.fillStyle='#1a1a1a';C.beginPath();C.arc(mx+8,my+9,2.5,0,Math.PI*2);C.fill();C.beginPath();C.arc(mx+16,my+9,2.5,0,Math.PI*2);C.fill();
  C.fillStyle='#FF69B4';C.beginPath();C.arc(mx+11,my+14,2.5,0,Math.PI*2);C.fill();
  C.fillStyle='#708090';C.fillRect(mx+3,my+18,16,7);
}

function drawHUD(light,seg){
  const now=getBJ(),h=now.getHours().toString().padStart(2,'0'),m=now.getMinutes().toString().padStart(2,'0'),s=now.getSeconds().toString().padStart(2,'0');
  C.fillStyle='rgba(0,0,0,0.55)';C.roundRect(50,H-95,125,55,8);C.fill();
  C.fillStyle='#FFF';C.font='bold 20px "Courier New"';C.textAlign='left';C.fillText(`${h}:${m}:${s}`,60,H-70);
  C.fillStyle='#FFD700';C.font='11px "Microsoft YaHei"';C.fillText(`${light.nm} · 北京时间`,60,H-50);

  C.fillStyle='rgba(0,0,0,0.55)';C.roundRect(W-260,10,210,60,8);C.fill();
  C.fillStyle='#FFF';C.font='bold 14px "Microsoft YaHei"';C.textAlign='right';C.fillText(`📍 ${seg.name}`,W-60,35);
  C.fillStyle='#CCC';C.font='12px "Microsoft YaHei"';C.fillText(seg.desc,W-60,52);

  if(stopped&&stName){C.fillStyle='rgba(0,0,0,0.65)';C.roundRect(W/2-110,H/2-25,220,55,10);C.fill();C.fillStyle='#FFD700';C.font='bold 18px "Microsoft YaHei"';C.textAlign='center';C.fillText(`🚉 ${stName}`,W/2,H/2-2);C.fillStyle='#FFF';C.font='12px';C.fillText(`停车 ${Math.ceil(stopT/60)}秒 · 点击发车`,W/2,H/2+22)}

  C.fillStyle='rgba(0,0,0,0.4)';C.fillRect(50,H-22,W-100,4);
  C.fillStyle='#FFD700';C.fillRect(50,H-22,(W-100)*Math.min(journeyPos/(ROUTE[ROUTE.length-1].km+300),1),4);
  ROUTE.forEach(r=>{const px=50+(W-100)*(r.km/(ROUTE[ROUTE.length-1].km+300));C.fillStyle='#FFF';C.fillRect(px-1,H-25,2,8)})
  C.fillStyle='#FFF';C.font='9px "Microsoft YaHei"';C.textAlign='center';C.fillText('上海',55,H-13);C.fillText('拉萨',W-55,H-13);
}

function drawTreePassing(){
  // 额外的前景大树快速掠过，增强流动感
  C.globalAlpha=0.35;
  for(let i=0;i<6;i++){
    const tx=((i*200+journeyPos*40*1.2)%(W+300))-150;
    const ty=GROUND-40-Math.sin(i*1.8)*20;
    C.fillStyle='#3A5A20';C.fillRect(tx-3,ty,6,GROUND-ty);
    C.fillStyle='#2D4A18';C.beginPath();C.arc(tx,ty,16,0,Math.PI*2);C.fill();C.beginPath();C.arc(tx-10,ty+8,12,0,Math.PI*2);C.fill();C.beginPath();C.arc(tx+10,ty+8,12,0,Math.PI*2);C.fill();
  }
  C.globalAlpha=1;
}

function draw(){
  const light=getLight(),seg=getSeg();
  C.clearRect(0,0,W,H);
  drawBg(light);
  drawTreePassing();
  drawTrain(light);
  drawMouse();
  drawHUD(light,seg);
}

cv.addEventListener('click',()=>{if(stopped){stopped=false;stopT=0;targetSpd=3;stName=''}else if(trainSpeed<0.3)targetSpd=2.5});
function loop(){updateTrain();draw();requestAnimationFrame(loop)}
loop();
</script></body></html>
